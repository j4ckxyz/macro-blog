<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Macroblog Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .ink { color: #111; }
    textarea, input, select { font-family: inherit; }
    .tab-active { border-bottom: 2px solid #111; font-weight: 700; }
  </style>
</head>
<body class="bg-white text-neutral-900">
  <div id="app" class="max-w-2xl mx-auto p-4"></div>

  <script>
  const API = location.origin;
  let token = localStorage.getItem("mb_token") || "";
  const app = document.getElementById("app");

  function h(tag, attrs = {}, ...kids) {
    const el = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
      if (k === "class") el.className = v;
      else if (k.startsWith("on")) el.addEventListener(k.slice(2), v);
      else if (k === "html") el.innerHTML = v;
      else el.setAttribute(k, v);
    }
    for (const kid of kids.flat()) {
      if (kid == null) continue;
      el.append(kid.nodeType ? kid : document.createTextNode(kid));
    }
    return el;
  }

  async function api(path, opts = {}) {
    const headers = Object.assign({ Authorization: "Bearer " + token }, opts.headers || {});
    if (opts.json) { headers["content-type"] = "application/json"; opts.body = JSON.stringify(opts.json); }
    const res = await fetch(API + path, { ...opts, headers });
    if (res.status === 401) { token = ""; localStorage.removeItem("mb_token"); renderLogin(); throw new Error("unauthorized"); }
    return res;
  }

  // ---- Login ----
  function renderLogin() {
    app.innerHTML = "";
    const pw = h("input", { type: "password", placeholder: "Password", class: "border rounded px-3 py-2 w-full" });
    const err = h("p", { class: "text-red-600 text-sm mt-2" });
    const btn = h("button", { class: "mt-3 bg-neutral-900 text-white px-4 py-2 rounded", onclick: async () => {
      const res = await fetch(API + "/api/login", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ password: pw.value }) });
      if (!res.ok) { err.textContent = "Incorrect password"; return; }
      const data = await res.json();
      token = data.access_token; localStorage.setItem("mb_token", token); renderApp();
    }}, "Sign in");
    pw.addEventListener("keydown", (e) => { if (e.key === "Enter") btn.click(); });
    app.append(h("h1", { class: "text-2xl font-bold mb-4" }, "Macroblog"), pw, btn, err);
  }

  // ---- Shell ----
  const TABS = ["Composer", "Posts", "Media", "Mentions", "Settings"];
  let active = "Composer";

  function renderApp() {
    app.innerHTML = "";
    const nav = h("nav", { class: "flex gap-4 border-b mb-6 text-sm" },
      ...TABS.map(t => h("button", { class: "py-2 " + (t === active ? "tab-active" : "text-neutral-500"), onclick: () => { active = t; renderApp(); } }, t)),
      h("button", { class: "py-2 ml-auto text-neutral-400", onclick: () => { localStorage.removeItem("mb_token"); token=""; renderLogin(); } }, "Sign out"),
    );
    app.append(h("h1", { class: "text-xl font-bold mb-3" }, "Macroblog"), nav);
    const view = h("div");
    app.append(view);
    ({ Composer: composer, Posts: postsView, Media: mediaView, Mentions: mentionsView, Settings: settingsView }[active])(view);
  }

  // ---- Composer ----
  function composer(view) {
    let type = "post";
    const title = h("input", { placeholder: "Title (optional)", class: "border rounded px-3 py-2 w-full mb-2 hidden" });
    const content = h("textarea", { placeholder: "What's on your mind?", rows: "6", class: "border rounded px-3 py-2 w-full mb-2" });
    const cats = h("input", { placeholder: "tags, comma, separated", class: "border rounded px-3 py-2 w-full mb-2" });
    const sched = h("input", { type: "datetime-local", class: "border rounded px-3 py-2 mb-2" });
    const photos = [];
    const photoList = h("div", { class: "text-xs text-neutral-500 mb-2" });
    const fileInput = h("input", { type: "file", accept: "image/*", class: "mb-2", onchange: async (e) => {
      for (const f of e.target.files) {
        const fd = new FormData(); fd.set("file", f);
        const res = await api("/api/media", { method: "POST", body: fd });
        const data = await res.json();
        photos.push({ url: data.url, alt: "" });
        photoList.append(h("div", {}, "📎 " + data.url));
      }
    }});

    const typeSel = h("div", { class: "flex gap-2 mb-3 text-sm" },
      ...["post", "article", "photo", "bookmark"].map(t => h("button", {
        class: "px-3 py-1 rounded border " + (t === type ? "bg-neutral-900 text-white" : ""),
        onclick: () => { type = t; [...typeSel.children].forEach((b,i) => b.className = "px-3 py-1 rounded border " + (["post","article","photo","bookmark"][i] === t ? "bg-neutral-900 text-white" : "")); title.classList.toggle("hidden", t !== "article"); }
      }, t)));

    const xp = h("div", { class: "flex gap-4 mb-3 text-sm" });
    api("/api/oauth/bluesky").then(r=>r.json()).then(d => { if (d.connected) xp.append(mkToggle("bluesky", "🦋 Bluesky")); });
    api("/api/oauth/mastodon").then(r=>r.json()).then(d => { if (d.connected) xp.append(mkToggle("mastodon", "🐘 Mastodon")); });
    const syndicate = new Set();
    function mkToggle(uid, label) {
      const cb = h("input", { type: "checkbox", onchange: e => e.target.checked ? syndicate.add(uid) : syndicate.delete(uid) });
      return h("label", { class: "flex items-center gap-1" }, cb, label);
    }

    const status = h("p", { class: "text-sm mt-2" });
    const submit = (draft) => async () => {
      const body = {
        type, content: content.value, title: title.value || undefined,
        categories: cats.value.split(",").map(s=>s.trim()).filter(Boolean),
        photos: photos.length ? photos : undefined,
        bookmark_of: type === "bookmark" ? (prompt("Bookmark URL") || "") : undefined,
        status: draft ? "draft" : "published",
        published: sched.value ? new Date(sched.value).toISOString() : undefined,
        syndicate_to: [...syndicate],
      };
      const res = await api("/api/posts", { method: "POST", json: body });
      if (res.ok) { const p = await res.json(); status.textContent = "✓ Published: /" + p.slug; content.value = ""; title.value=""; cats.value=""; }
      else status.textContent = "Error: " + (await res.text());
    };

    view.append(typeSel, title, content, cats,
      h("div", { class: "mb-2" }, h("label", { class: "text-xs text-neutral-500" }, "Photo: "), fileInput), photoList,
      h("div", { class: "mb-2" }, h("label", { class: "text-xs text-neutral-500 mr-2" }, "Schedule:"), sched),
      xp,
      h("div", { class: "flex gap-2" },
        h("button", { class: "bg-neutral-900 text-white px-4 py-2 rounded", onclick: submit(false) }, "Publish"),
        h("button", { class: "border px-4 py-2 rounded", onclick: submit(true) }, "Save Draft")),
      status);
  }

  // ---- Posts ----
  async function postsView(view) {
    const sel = h("select", { class: "border rounded px-2 py-1 mb-3", onchange: () => load(sel.value) },
      ...["", "published", "draft", "scheduled"].map(s => h("option", { value: s }, s || "all")));
    const list = h("div");
    view.append(sel, list);
    async function load(status) {
      list.innerHTML = "Loading…";
      const res = await api("/api/posts" + (status ? "?status=" + status : ""));
      const { posts } = await res.json();
      list.innerHTML = "";
      for (const p of posts) {
        list.append(h("div", { class: "border-b py-2 flex justify-between items-center" },
          h("div", {}, h("span", { class: "text-xs bg-neutral-100 px-1 rounded mr-2" }, p.post_type),
            h("span", {}, p.title || p.slug), h("div", { class: "text-xs text-neutral-400" }, p.status + " · " + (p.published_at || p.created_at))),
          h("button", { class: "text-red-600 text-sm", onclick: async () => { if (confirm("Delete?")) { await api("/api/posts/" + p.slug, { method: "DELETE" }); load(sel.value); } } }, "delete")));
      }
      if (!posts.length) list.textContent = "No posts.";
    }
    load("");
  }

  // ---- Media ----
  async function mediaView(view) {
    const res = await api("/api/media");
    const { media } = await res.json();
    const grid = h("div", { class: "grid grid-cols-3 gap-2" });
    for (const m of media) {
      const cell = (m.mime_type||"").startsWith("image")
        ? h("img", { src: m.url, class: "w-full h-28 object-cover rounded cursor-pointer", title: "click to copy" })
        : h("div", { class: "border rounded p-2 text-xs break-all" }, m.filename);
      cell.addEventListener("click", () => { navigator.clipboard.writeText(location.origin + m.url); cell.style.outline = "2px solid #111"; });
      grid.append(cell);
    }
    view.append(grid.children.length ? grid : h("p", {}, "No media yet."));
  }

  // ---- Mentions (webmentions + Bluesky/Mastodon replies, unified) ----
  async function mentionsView(view) {
    const reload = () => { view.innerHTML = ""; mentionsView(view); };
    const res = await api("/api/mentions");
    const { webmentions, social } = await res.json();

    view.append(h("div", { class: "flex justify-between items-center mb-3" },
      h("h2", { class: "font-bold" }, "Mentions"),
      h("button", { class: "border px-3 py-1 rounded text-sm", onclick: async () => { await api("/api/mentions/poll", { method: "POST" }); reload(); } }, "↻ Poll replies")));

    const icon = { bluesky: "🦋", mastodon: "🐘" };
    if (social.length) view.append(h("h3", { class: "text-sm font-bold text-neutral-500 mt-2" }, "Replies"));
    for (const s of social) {
      const box = h("textarea", { rows: "2", placeholder: "Reply…", class: "border rounded px-2 py-1 w-full mt-2 text-sm" });
      const status = h("span", { class: "text-xs text-green-700 ml-2" });
      view.append(h("div", { class: "border-b py-2" },
        h("div", { class: "text-sm" }, (icon[s.platform] || "") + " ",
          h("a", { href: s.url || "#", target: "_blank", class: "underline" }, s.author || "someone"),
          s.replied ? h("span", { class: "text-xs text-neutral-400 ml-2" }, "(replied)") : null),
        h("div", { class: "text-sm text-neutral-700" }, s.content || ""),
        box,
        h("button", { class: "bg-neutral-900 text-white px-3 py-1 rounded text-sm mt-1", onclick: async () => {
          const r = await api("/api/mentions/" + s.id + "/reply", { method: "POST", json: { text: box.value } });
          if (r.ok) { status.textContent = "✓ sent"; } else { status.textContent = "✗ " + (await r.json()).error; }
        } }, "Reply"), status));
    }

    view.append(h("h3", { class: "text-sm font-bold text-neutral-500 mt-4" }, "Webmentions"));
    if (!webmentions.length) view.append(h("p", { class: "text-sm text-neutral-400" }, "None yet."));
    for (const w of webmentions) {
      view.append(h("div", { class: "border-b py-2" },
        h("div", { class: "text-sm" }, h("strong", {}, w.author_name || w.author_url || "Anon"), " — " + w.type),
        h("div", { class: "text-sm text-neutral-600" }, w.content || w.source),
        h("div", { class: "text-xs mt-1" },
          w.status === "pending" ? h("span", {},
            h("button", { class: "text-green-700 mr-2", onclick: async () => { await api("/api/webmentions/" + w.id, { method: "PATCH", json: { status: "approved" } }); reload(); } }, "approve"),
            h("button", { class: "text-red-600", onclick: async () => { await api("/api/webmentions/" + w.id, { method: "PATCH", json: { status: "rejected" } }); reload(); } }, "reject"))
          : h("span", { class: "text-neutral-400" }, w.status))));
    }
  }

  // ---- Settings (all controls) ----
  async function settingsView(view) {
    const cfg = await (await api("/api/config")).json();
    const status = h("p", { class: "text-sm mt-2 text-green-700" });
    const field = (label, el) => h("div", { class: "mb-2" }, h("label", { class: "text-xs text-neutral-500 block" }, label), el);
    const inp = (val) => h("input", { class: "border rounded px-3 py-2 w-full", value: val ?? "" });
    const chk = (val) => { const c = h("input", { type: "checkbox" }); c.checked = !!val; return c; };

    // Site
    const title = inp(cfg.site.title), desc = inp(cfg.site.description), author = inp(cfg.site.author), username = inp(cfg.site.username), url = inp(cfg.site.url);
    // Feeds & webmentions
    const perPage = inp(cfg.feeds.posts_per_page), inclReply = chk(cfg.feeds.include_reply_type);
    const wmRecv = chk(cfg.webmentions.receive), wmSend = chk(cfg.webmentions.send), wmMod = chk(cfg.webmentions.moderation);
    // Crossposting
    const bsEnabled = chk(cfg.crossposting.bluesky.enabled), bsHandle = inp(cfg.crossposting.bluesky.handle);
    const mEnabled = chk(cfg.crossposting.mastodon.enabled), mInst = inp(cfg.crossposting.mastodon.instance_url);
    const pingEnabled = chk(cfg.microblog.ping_enabled);
    // Theme
    const themeData = await (await api("/api/themes")).json();
    const themeSel = h("select", { class: "border rounded px-2 py-1" },
      h("option", { value: "" }, "(default)"),
      ...themeData.themes.map(t => { const o = h("option", { value: t }, t); if (t === themeData.active) o.selected = true; return o; }));

    const save = async () => {
      await api("/api/config", { method: "PUT", json: {
        site: { title: title.value, description: desc.value, author: author.value, username: username.value, url: url.value },
        feeds: { posts_per_page: Number(perPage.value), include_reply_type: inclReply.checked },
        webmentions: { receive: wmRecv.checked, send: wmSend.checked, moderation: wmMod.checked },
        crossposting: { bluesky: { enabled: bsEnabled.checked, handle: bsHandle.value }, mastodon: { enabled: mEnabled.checked, instance_url: mInst.value } },
        microblog: { ping_enabled: pingEnabled.checked },
        hugo: { theme: themeSel.value },
      }});
      status.textContent = "✓ Saved — rebuild to apply.";
    };

    const bs = await (await api("/api/oauth/bluesky")).json();
    const ma = await (await api("/api/oauth/mastodon")).json();

    view.append(
      h("h2", { class: "font-bold mb-2" }, "Site"),
      field("Title", title), field("Description", desc), field("Author", author), field("Username (rel-me / webfinger)", username), field("Public URL", url),
      h("h2", { class: "font-bold mb-2 mt-4" }, "Feeds"),
      field("Posts per page", perPage),
      h("label", { class: "text-sm flex items-center gap-2 mb-3" }, inclReply, "Include replies in main feed"),
      h("h2", { class: "font-bold mb-2 mt-4" }, "Webmentions"),
      h("label", { class: "text-sm flex items-center gap-2" }, wmRecv, "Receive"),
      h("label", { class: "text-sm flex items-center gap-2" }, wmSend, "Send"),
      h("label", { class: "text-sm flex items-center gap-2 mb-3" }, wmMod, "Hold for moderation"),

      h("h2", { class: "font-bold mb-2 mt-4" }, "Cross-posting"),
      h("label", { class: "text-sm flex items-center gap-2" }, bsEnabled, "Bluesky enabled"),
      field("Bluesky handle", bsHandle),
      h("p", { class: "text-sm mb-3" }, bs.connected
        ? h("span", {}, "✓ Connected as " + (bs.handle || "?") + " ", h("button", { class: "text-red-600 ml-2", onclick: async () => { await api("/api/oauth/bluesky/disconnect", { method: "POST" }); settingsReload(view); } }, "disconnect"))
        : h("a", { href: "/oauth/bluesky/connect", class: "underline" }, "Connect Bluesky →")),
      h("label", { class: "text-sm flex items-center gap-2" }, mEnabled, "Mastodon enabled"),
      field("Mastodon instance", mInst),
      h("p", { class: "text-sm mb-3" }, ma.connected
        ? h("span", {}, "✓ Connected (" + (ma.instance || "?") + ") ", h("button", { class: "text-red-600 ml-2", onclick: async () => { await api("/api/oauth/mastodon/disconnect", { method: "POST" }); settingsReload(view); } }, "disconnect"))
        : h("button", { class: "border px-2 py-1 rounded", onclick: () => { location.href = "/oauth/mastodon/connect?instance=" + encodeURIComponent(mInst.value); } }, "Connect Mastodon")),
      h("label", { class: "text-sm flex items-center gap-2 mb-3" }, pingEnabled, "Ping Micro.blog on publish"),

      h("h2", { class: "font-bold mb-2 mt-4" }, "Theme"),
      field("Active theme (drop themes into hugo-site/themes/)", themeSel),

      h("button", { class: "bg-neutral-900 text-white px-4 py-2 rounded mt-4", onclick: save }, "Save settings"),

      h("h2", { class: "font-bold mb-2 mt-6" }, "Security"),
      passwordChanger(),

      h("h2", { class: "font-bold mb-2 mt-6" }, "Backup & Build"),
      h("div", { class: "flex gap-2 flex-wrap" },
        h("button", { class: "border px-4 py-2 rounded", onclick: async () => {
          const r = await fetch(API + "/api/backup", { headers: { Authorization: "Bearer " + token } });
          const blob = await r.blob(); const a = document.createElement("a");
          a.href = URL.createObjectURL(blob); a.download = (r.headers.get("content-disposition")||"backup.tar.gz").split("filename=")[1]?.replaceAll('"','') || "macroblog-backup.tar.gz"; a.click();
        } }, "⬇ Download backup"),
        h("button", { class: "border px-4 py-2 rounded", onclick: async () => { status.textContent = "Building…"; const s = await (await api("/api/hugo/build", { method: "POST" })).json(); status.textContent = s.lastSuccess ? "✓ Built in " + s.durationMs + "ms" : "Build failed"; } }, "Rebuild site")),
      status);
  }

  function settingsReload(view) { view.innerHTML = ""; settingsView(view); }

  function passwordChanger() {
    const pw = h("input", { type: "password", placeholder: "New password", class: "border rounded px-3 py-2" });
    const msg = h("span", { class: "text-xs ml-2" });
    return h("div", { class: "flex items-center" }, pw,
      h("button", { class: "border px-3 py-2 rounded ml-2", onclick: async () => {
        const r = await api("/api/password", { method: "PUT", json: { password: pw.value } });
        msg.textContent = r.ok ? "✓ changed" : "✗ " + (await r.json()).error; pw.value = "";
      } }, "Change password"), msg);
  }

  // boot
  if (token) renderApp(); else renderLogin();
  </script>
</body>
</html>
