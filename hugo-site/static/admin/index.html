<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Macroblog</title>
  <style>
    :root{
      --orange:#ff8c00; --blue:#3a6fd6; --blue-text:#3f7fd6; --blue-hover:#2f63c9;
      --bg:#ffffff; --side:#f6f7f9; --border:#e4e6ea; --line:#eceef1;
      --text:#222426; --muted:#8a9099; --field:#d4d8dd;
      --card:#ffffff; --card2:#fbfcfd; --hover:#eef0f3; --active:#e6ebf4;
      --input-border:#dfe2e6; --input-bg:#ffffff; --tag-bg:#eef0f3; --shadow:rgba(0,0,0,.05);
      --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color-scheme:light;
    }
    :root[data-theme="dark"], :root[data-theme="dark"] *{color-scheme:dark}
    @media (prefers-color-scheme: dark){
      :root:not([data-theme="light"]){
        --blue:#5b8def; --blue-text:#7aa7ee; --blue-hover:#6b97e0;
        --bg:#15171a; --side:#1b1e22; --border:#2a2e34; --line:#23262b;
        --text:#e6e8eb; --muted:#9aa3ad; --field:#3a3f46;
        --card:#1b1e22; --card2:#202429; --hover:#23272d; --active:#2a3340;
        --input-border:#343a42; --input-bg:#1b1e22; --tag-bg:#2a2e34; --shadow:rgba(0,0,0,.4);
        color-scheme:dark;
      }
    }
    :root[data-theme="dark"]{
      --blue:#5b8def; --blue-text:#7aa7ee; --blue-hover:#6b97e0;
      --bg:#15171a; --side:#1b1e22; --border:#2a2e34; --line:#23262b;
      --text:#e6e8eb; --muted:#9aa3ad; --field:#3a3f46;
      --card:#1b1e22; --card2:#202429; --hover:#23272d; --active:#2a3340;
      --input-border:#343a42; --input-bg:#1b1e22; --tag-bg:#2a2e34; --shadow:rgba(0,0,0,.4);
      color-scheme:dark;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%}
    body{font-family:var(--sans);color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
    a{color:var(--blue-text);text-decoration:none}
    button{font-family:inherit;cursor:pointer}
    input,textarea,select{background:var(--input-bg);color:var(--text)}

    /* layout */
    .shell{display:flex;min-height:100vh}
    .sidebar{
      position: sticky;
      top: 0;
      height: 100vh;
      width:280px;
      flex:0 0 280px;
      background:var(--side);
      border-right:1px solid var(--border);
      padding:22px 16px;
      display:flex;
      flex-direction:column;
      gap:6px;
      overflow-y:auto;
    }
    .main{flex:1;min-width:0;padding:26px 40px}

    /* brand */
    .brand{display:flex;align-items:center;gap:10px;margin:2px 4px 18px}
    .brand .mark{width:34px;height:34px;border-radius:9px;background:var(--orange);display:flex;align-items:center;justify-content:center;color:#fff}
    .brand .name{font-size:25px;font-weight:800;color:var(--orange);letter-spacing:-.5px}

    /* new post button */
    .newpost{display:flex;align-items:center;gap:10px;width:100%;background:var(--card);border:1px solid var(--input-border);border-radius:11px;padding:11px 14px;font-size:16px;font-weight:700;color:var(--text);box-shadow:0 1px 1px rgba(0,0,0,.02)}
    .newpost:hover{background:var(--hover)}

    /* account row */
    .account{display:flex;align-items:center;gap:10px;padding:14px 6px 12px}
    .account .avatar{width:38px;height:38px;border-radius:50%;object-fit:cover;background:var(--field)}
    .account .handle{font-weight:700;font-size:16px}

    /* nav */
    .nav{display:flex;flex-direction:column;gap:2px;margin-top:2px}
    .nav a{display:flex;align-items:center;gap:13px;padding:8px 8px;border-radius:9px;color:var(--blue-text);font-size:18px;font-weight:600}
    .nav a .ic{width:22px;height:22px;display:flex;align-items:center;justify-content:center;color:var(--blue-text)}
    .nav a:hover{background:var(--hover)}
    .nav a.active{background:var(--active)}
    .nav .sep{height:1px;background:var(--border);margin:12px 6px}
    .themetoggle{margin-top:auto;display:flex;align-items:center;gap:10px;background:none;border:1px solid var(--border);border-radius:9px;padding:8px 10px;color:var(--muted);font-weight:600;font-size:14px;text-align:left}
    .themetoggle:hover{background:var(--hover)}
    .themetoggle .ic{display:flex;align-items:center;justify-content:center}
    .nav .sign-out{margin-top:8px;color:var(--muted);font-weight:600;font-size:15px}

    /* main: composer */
    .post-head{font-size:22px;margin:2px 0 16px;display:flex;align-items:center;gap:8px}
    .post-head b{font-weight:800}
    .dots{margin-left:auto;width:34px;height:34px;border-radius:50%;border:0;background:transparent;color:var(--muted);font-size:22px}
    .dots:hover{background:var(--hover)}

    .composer{max-width:1040px}
    .editor{width:100%;min-height:360px;border:1.5px solid var(--field);border-radius:14px;padding:18px 20px;font-size:21px;line-height:1.5;font-family:var(--sans);resize:vertical;outline:none;color:var(--text)}
    .editor:focus{border-color:#7aa7ee;box-shadow:0 0 0 3px rgba(58,111,214,.15)}
    .editor::placeholder{color:var(--muted)}

    .titlefield{width:100%;border:1.5px solid var(--field);border-radius:12px;padding:12px 16px;font-size:18px;margin-bottom:10px;outline:none}
    .titlefield:focus{border-color:#7aa7ee}

    .toolbar{display:flex;align-items:center;gap:10px;margin-top:14px}
    .tbtn{width:46px;height:42px;border:1px solid var(--input-border);background:var(--card);border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
    .tbtn:hover{background:var(--hover)}
    .count{color:var(--muted);font-size:16px;margin-left:6px}
    .count.over{color:#d33}
    .count.thread{color:var(--blue)}
    .spacer{flex:1}
    .btn{border-radius:9px;padding:10px 20px;font-size:16px;font-weight:700;border:1px solid transparent}
    .btn.secondary{background:var(--card);border-color:var(--input-border);color:var(--text)}
    .btn.secondary:hover{background:var(--hover)}
    .btn.primary{background:var(--blue);color:#fff}
    .btn.primary:hover{background:var(--blue-hover)}
    .btn.danger{color:#d33}
    .conn{display:flex;align-items:center;gap:12px;font-size:15px;color:#2a8a4a}

    .menu{border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;background:var(--card2);box-shadow:0 4px 16px var(--shadow)}
    .menu-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:10px 0 6px}
    .menu-label:first-child{margin-top:0}
    .menu input[type=text],.menu input[type=datetime-local]{border:1px solid var(--input-border);border-radius:9px;padding:9px 11px;font-size:14px}
    .types{display:flex;gap:8px;margin:0 0 4px}
    .chip{border:1px solid var(--input-border);background:var(--card);border-radius:20px;padding:6px 14px;font-size:14px;font-weight:600;color:var(--muted)}
    .chip.on{background:var(--blue);border-color:var(--blue);color:#fff}

    .extras{display:flex;flex-wrap:wrap;gap:18px;align-items:center;margin-top:14px;color:var(--muted);font-size:14px}
    .extras label{display:flex;align-items:center;gap:6px}
    .extras input[type=text],.extras input[type=datetime-local]{border:1px solid var(--input-border);border-radius:8px;padding:7px 10px;font-size:14px}
    .toast{margin-top:14px;font-size:15px;color:#2a8a4a;min-height:20px}
    .photolist{display:flex;gap:8px;flex-direction:column;margin-top:10px}
    .photolist img{width:70px;height:70px;object-fit:cover;border-radius:8px;border:1px solid var(--border)}
    .drop{margin-top:10px;border:1.5px dashed var(--field);border-radius:12px;padding:14px;color:var(--muted);font-size:14px;text-align:center}
    .drop.hover{border-color:var(--blue);background:var(--active)}

    /* lists / panels */
    h2.section{font-size:20px;font-weight:800;margin:0 0 14px}
    h3.sub{font-size:14px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:18px 0 8px}
    .row{display:flex;align-items:center;justify-content:space-between;padding:14px 2px;border-bottom:1px solid var(--line)}
    .row .meta{color:var(--muted);font-size:13px;margin-top:3px}
    .tag{font-size:12px;background:var(--tag-bg);color:var(--muted);border-radius:6px;padding:2px 7px;margin-right:8px;font-weight:600}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;cursor:pointer;border:1px solid var(--border)}
    .card{border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
    .field{margin-bottom:12px;max-width:520px}
    .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:4px}
    .field input,.field select{width:100%;border:1px solid var(--input-border);border-radius:9px;padding:10px 12px;font-size:15px}
    .ck{display:flex;align-items:center;gap:8px;font-size:15px;margin:6px 0}
    .replybox{width:100%;border:1px solid var(--input-border);border-radius:10px;padding:8px 10px;font-size:14px;margin-top:8px;resize:vertical}
    select{font-family:inherit}

    /* login */
    .login{max-width:360px;margin:14vh auto;text-align:center}
    .login .brand{justify-content:center}
    .login input{width:100%;border:1.5px solid var(--field);border-radius:11px;padding:13px 15px;font-size:17px;margin-top:6px}
    .login input:focus{outline:none;border-color:#7aa7ee}
    .login .btn{width:100%;margin-top:14px}
    .err{color:#d33;font-size:14px;margin-top:10px;min-height:18px}

    /* shared */
    .viewhead{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .banner{background:#fff5f5;border:1px solid #f3c2c2;color:#a23;border-radius:10px;padding:10px 14px;margin:10px 0;font-size:14px}
    .banner a{color:#a23;font-weight:700;text-decoration:underline}
    .conn.reauth{color:#a23}
    .hint{font-size:13px;color:#a23;background:#fff7f0;border:1px solid #f0d8c0;border-radius:8px;padding:8px 10px;margin-top:6px}
    .logbox{background:#0d0f12;color:#d6e2ec;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;line-height:1.5;padding:14px;border-radius:10px;white-space:pre-wrap;overflow:auto;max-height:70vh;word-break:break-word}
    .colorrow{display:flex;gap:18px;flex-wrap:wrap}
    .colorrow label{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--muted)}
    .sortlist{display:flex;flex-direction:column;gap:6px;max-width:520px}
    .sortrow{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:6px 8px}
    .sortrow.dragging{opacity:.5;border-color:var(--blue)}
    .drag-handle{cursor:grab;color:var(--muted);font-size:16px;user-select:none;padding:0 2px;line-height:1}
    .drag-handle:active{cursor:grabbing}
    .theme-preview{flex:1;min-width:170px;border:1px solid var(--border);border-radius:12px;padding:14px}
    .preview{border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-top:12px}
    .preview img{max-width:100%;border-radius:8px;margin:8px 0}
    .preview .hashtag{color:var(--blue);font-weight:600}
    .photo-edit{display:flex;gap:10px;align-items:center;margin-top:8px}
    .photo-edit img,.photo-edit video{width:64px;height:64px;object-fit:cover;border-radius:8px;flex:0 0 64px}
    .composer-options{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-top:12px;padding:2px 4px}
    .composer-checkboxes{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
    .tags-input{border:1.5px solid var(--field);border-radius:10px;padding:6px 12px;font-size:14px;outline:none;width:180px;background:var(--card);color:var(--text);transition:border-color 0.2s, width 0.2s}
    .tags-input:focus{border-color:#7aa7ee;width:240px}
    .photo-edit input{flex:1;border:1px solid var(--input-border);border-radius:8px;padding:8px 10px;font-size:14px}

    /* timeline */
    .tl-item{display:flex;gap:12px;padding:14px 10px;border-bottom:1px solid var(--line);color:var(--text);border-radius:10px;margin-bottom:8px;transition: background .15s;}
    .tl-item:hover{background:var(--hover)}
    .tl-item.tl-selected{background:var(--hover);outline:2px solid var(--blue);outline-offset:-2px;}
    .mention-reason{font-size:12px;color:var(--muted);background:var(--tag-bg);border-radius:20px;padding:1px 8px;margin-left:2px}
    .empty-state{text-align:center;padding:48px 20px;color:var(--muted)}
    .empty-state svg{width:38px;height:38px;opacity:.5;margin-bottom:10px}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;max-width:520px;width:100%;max-height:85vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.35)}
    .bulkbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--blue);border-radius:10px;padding:8px 12px;margin-bottom:12px}
    .selectcb{width:17px;height:17px;flex:0 0 auto;cursor:pointer}
    .tl-item.is-reply{border-left: 3px solid var(--blue); padding-left: 14px; background: rgba(58,111,214,0.03); margin-left: 10px;}
    .tl-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;background:var(--field);flex:0 0 44px}
    .tl-body{min-width:0;flex:1}
    .tl-repost{font-size:12px;color:var(--muted);margin-bottom:2px}
    .tl-meta{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;font-size:14px}
    .tl-author{font-weight:700}
    .tl-handle,.tl-dot,.tl-time{color:var(--muted)}
    .tl-badge{margin-left:auto;display:inline-flex;align-items:center;}
    .tl-text{margin-top:3px;white-space:pre-wrap;overflow-wrap:anywhere;line-height:1.45}
    .tl-media{display:grid;gap:3px;margin-top:10px;border-radius:16px;overflow:hidden;border:1px solid var(--border);width:100%;aspect-ratio:16/9;max-height:510px;}
    .tl-media.grid-1{grid-template-columns:1fr;grid-template-rows:1fr;}
    .tl-media.grid-2{grid-template-columns:1fr 1fr;grid-template-rows:1fr;}
    .tl-media.grid-3{grid-template-columns:1.2fr 1fr;grid-template-rows:1fr 1fr;}
    .tl-media.grid-3 > div:first-child{grid-row:span 2;}
    .tl-media.grid-4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
    .tl-media > div{position:relative;width:100%;height:100%;overflow:hidden;}
    .tl-media img{width:100%;height:100%;object-fit:cover;cursor:pointer;display:block;transition:transform 0.15s, opacity 0.15s;}
    .tl-media img:hover{transform:scale(1.015);opacity:0.92;}
    .tl-media-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);color:#fff;font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;pointer-events:none;user-select:none;}

    /* timeline embeds */
    .tl-embed-link{border:1px solid var(--border);border-radius:12px;display:flex;overflow:hidden;margin-top:10px;text-decoration:none;color:var(--text);background:var(--card2);transition:border-color .15s, background .15s;max-height:120px;cursor:pointer;}
    .tl-embed-link:hover{border-color:var(--blue);background:var(--hover);}
    .tl-embed-link-thumb{width:120px;height:120px;object-fit:cover;flex-shrink:0;background:var(--field);border-right:1px solid var(--border);}
    .tl-embed-link-content{padding:12px;display:flex;flex-direction:column;justify-content:center;min-width:0;flex-grow:1;}
    .tl-embed-link-title{font-size:14px;font-weight:700;margin:0 0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .tl-embed-link-desc{font-size:13px;color:var(--muted);margin:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.35;}
    .tl-embed-link-domain{font-size:11px;color:var(--muted);margin-top:4px;text-transform:lowercase;font-weight:500;}

    .tl-embed-quote{border:1px solid var(--border);border-radius:12px;padding:12px;margin-top:10px;display:flex;flex-direction:column;gap:8px;background:var(--card2);text-decoration:none;color:var(--text);transition:border-color .15s, background .15s;}
    .tl-embed-quote:hover{border-color:var(--blue);background:var(--hover);}
    .tl-embed-quote-header{display:flex;align-items:center;gap:8px;font-size:13px;}
    .tl-embed-quote-avatar{width:20px;height:20px;border-radius:50%;object-fit:cover;}
    .tl-embed-quote-author{font-weight:700;}
    .tl-embed-quote-handle{color:var(--muted);}
    .tl-embed-quote-time{color:var(--muted)}
    .tl-embed-quote-text{font-size:13.5px;line-height:1.4;white-space:pre-wrap;}

    /* mobile chrome (hidden on desktop) */
    .topbar,.bottomnav{display:none}

    @media(max-width:760px){
      .sidebar{display:none}
      .shell{flex-direction:column}
      .main{padding:14px 14px 84px}
      .topbar{display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 14px}
      .topbar .brand{margin:0}
      .topbar .name{font-size:20px}
      .topnew{width:42px;height:42px;border-radius:10px;border:1px solid var(--input-border);background:var(--card);color:var(--text);display:flex;align-items:center;justify-content:center}
      .bottomnav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:30;background:var(--bg);border-top:1px solid var(--border);padding:6px 4px env(safe-area-inset-bottom);overflow-x:auto;-webkit-overflow-scrolling:touch}
      .bottomnav .tab{flex:0 0 auto;min-width:62px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;color:var(--muted);font-size:11px;font-weight:600}
      .bottomnav .tab svg{width:24px;height:24px}
      .bottomnav .tab.active{color:var(--blue)}
      .post-head{font-size:18px}
      .editor{font-size:16px;min-height:46vh;padding:14px}
      .composer{max-width:none}
      .toolbar{gap:6px;flex-wrap:wrap}
      .tbtn{width:42px;height:40px}
      .btn{padding:10px 16px}
      .field,.field input,.field select{max-width:none}
      .titlefield,.editor,.replybox{width:100%}
      .grid{grid-template-columns:repeat(3,1fr)}
      .count{font-size:14px}
    }
    @media(max-width:380px){ .bottomnav .tab span{display:none} }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
  const API = location.origin;
  const FONT_STACKS={system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif",sans:"Helvetica,Arial,sans-serif",serif:"Georgia,'Times New Roman',serif",mono:"ui-monospace,Menlo,Consolas,monospace",rounded:"'Avenir Next','Segoe UI',system-ui,sans-serif"};
  let token = localStorage.getItem("mb_token") || "";
  let cfg = null;
  let active = "composer";
  let showReplies = localStorage.getItem("mb_show_replies") === "true";
  let timelineSearchQuery = "";
  let editingPostSlug = null;
  const root = document.getElementById("app");

  /* ---------------- admin theme (light / dark) ---------------- */
  const THEME_LABELS = {auto:"Auto", light:"Light", dark:"Dark"};
  let theme = localStorage.getItem("mb_theme") || "auto";
  function applyTheme(t){
    const r = document.documentElement;
    if (t === "auto") r.removeAttribute("data-theme"); else r.setAttribute("data-theme", t);
  }
  function cycleTheme(){
    theme = theme === "auto" ? "light" : theme === "light" ? "dark" : "auto";
    localStorage.setItem("mb_theme", theme);
    applyTheme(theme);
    if (token && cfg) renderApp();
  }
  function themeBtn(){
    return h("button",{class:"themetoggle",title:"Switch light / dark mode",onclick:cycleTheme},
      h("span",{class:"ic",html:ICON.theme}), "Theme: "+THEME_LABELS[theme]);
  }
  applyTheme(theme);

  // tiny dom helper
  function h(tag, attrs = {}, ...kids){
    const el = document.createElement(tag);
    for (const [k,v] of Object.entries(attrs)){
      if (k==="class") el.className=v;
      else if (k==="html") el.innerHTML=v;
      else if (k.startsWith("on")&&typeof v==="function") el.addEventListener(k.slice(2),v);
      else if (v!=null) el.setAttribute(k,v);
    }
    for (const kid of kids.flat()){ if(kid==null) continue; el.append(kid.nodeType?kid:document.createTextNode(kid)); }
    return el;
  }
  
  function debounce(func, wait) {
    let timeout;
    return function(...args) {
      clearTimeout(timeout);
      timeout = setTimeout(() => func.apply(this, args), wait);
    };
  }

  /* Lightweight modal: title + body node + confirm/cancel. onConfirm may be async. */
  function showModal(title, bodyNode, confirmLabel, onConfirm, opts={}){
    const overlay=h("div",{class:"modal-overlay",role:"dialog","aria-modal":"true","aria-label":title});
    const onKey=e=>{ if(e.key==="Escape") close(); };
    const close=()=>{ overlay.remove(); document.removeEventListener("keydown",onKey); };
    const confirmBtn=h("button",{class:"btn "+(opts.danger?"secondary":"primary"),style:opts.danger?"color:#d33":"",onclick:async()=>{
      confirmBtn.disabled=true;confirmBtn.textContent="Working…";

  function crosspostLinksNode(posts){

  function openLightbox(mediaItems, currentIndex) {
    // If a single URL string is passed, wrap it as a single-item array.
    const items = typeof mediaItems === "string" ? [{ url: mediaItems, alt: currentIndex || "" }] : mediaItems;
    if (!items || !items.length) return;
    let index = typeof currentIndex === "number" ? currentIndex : 0;
    
    const imgEl = h("img", {
      src: items[index].url,
      alt: items[index].alt || "",
      style: "max-width:90%;max-height:90%;object-fit:contain;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,0.5);cursor:default;",
      onclick: (e) => e.stopPropagation()

    const descEl = h("div", {
      style: "color:#fff;background:rgba(0,0,0,0.6);padding:8px 16px;border-radius:20px;font-size:14px;margin-top:12px;max-width:80%;text-align:center;pointer-events:none;min-height:36px;"
    }, items[index].alt || "");

    const updateImage = () => {
      imgEl.src = items[index].url;
      imgEl.alt = items[index].alt || "";
      descEl.textContent = items[index].alt || "";
      if (items.length > 1) {
        prevBtn.style.display = index > 0 ? "flex" : "none";
        nextBtn.style.display = index < items.length - 1 ? "flex" : "none";
        counterEl.textContent = `${index + 1} / ${items.length}`;
      } else {
        prevBtn.style.display = "none";
        nextBtn.style.display = "none";
        counterEl.style.display = "none";
      }
    };

    const prevBtn = h("button", {
      style: "position:absolute;left:20px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.25);border:none;color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.2s;",
      onclick: (e) => {
        e.stopPropagation();
        if (index > 0) {
          index--;
          updateImage();
        }
      }
    }, "‹");
    prevBtn.addEventListener("mouseover", () => prevBtn.style.background = "rgba(255,255,255,0.4)");
    prevBtn.addEventListener("mouseout", () => prevBtn.style.background = "rgba(255,255,255,0.25)");

    const nextBtn = h("button", {
      style: "position:absolute;right:20px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.25);border:none;color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.2s;",
      onclick: (e) => {
        e.stopPropagation();
        if (index < items.length - 1) {
          index++;
          updateImage();
        }
      }
    }, "›");
    nextBtn.addEventListener("mouseover", () => nextBtn.style.background = "rgba(255,255,255,0.4)");
    nextBtn.addEventListener("mouseout", () => nextBtn.style.background = "rgba(255,255,255,0.25)");

    const counterEl = h("div", {
      style: "position:absolute;top:20px;color:#fff;font-size:16px;font-weight:600;background:rgba(0,0,0,0.5);padding:6px 12px;border-radius:15px;"
    }, `${index + 1} / ${items.length}`);

    const backdrop = h("div", {
      style: "position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:zoom-out;",
      onclick: () => {
        document.removeEventListener("keydown", handleKey);
        backdrop.remove();
      }
    },
      counterEl,
      prevBtn,
      h("div", { style: "display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;max-width:90%;max-height:85%;" },
        imgEl,
        descEl
      ),
      nextBtn
    );

    const handleKey = (e) => {
      if (e.key === "Escape") {
        backdrop.click();
      } else if (e.key === "ArrowLeft" && index > 0) {
        index--;
        updateImage();
      } else if (e.key === "ArrowRight" && index < items.length - 1) {
        index++;
        updateImage();
      }
    };
    document.addEventListener("keydown", handleKey);

    updateImage();
    document.body.appendChild(backdrop);
  }

  function formatPostText(text, platform) {
    if (!text) return "";
    let html = escapeHtml(text);
    
    // 1. Format URLs/links
    const urlRegex = /(https?:\/\/[^\s)]+)/g;
    html = html.replace(urlRegex, '<a href="$1" target="_blank" rel="noopener" style="color:var(--blue);font-weight:500;">$1</a>');
    
    // 2. Format @-mentions
    if (platform === "bluesky") {
      html = html.replace(/(^|\s)@([A-Za-z0-9.-]+)/g, (m, space, handle) => {
        return space + `<a href="https://bsky.app/profile/${handle}" target="_blank" rel="noopener" style="color:var(--blue);font-weight:500;">@${handle}</a>`;
      });
    } else if (platform === "mastodon") {
      html = html.replace(/(^|\s)@([A-Za-z0-9_.-]+(?:@[A-Za-z0-9_.-]+)?)/g, (m, space, handle) => {
        const parts = handle.split("@");
        let href = "#";
        if (parts.length === 2) {
          const [user, domain] = parts;
          href = `https://${domain}/@${user}`;
        } else {
          const inst = (cfg && cfg.crossposting && cfg.crossposting.mastodon && cfg.crossposting.mastodon.instance_url) || "";
          if (inst) {
            href = `${inst.replace(/\/+$/, "")}/@${handle}`;
          }
        }
        return space + `<a href="${href}" target="_blank" rel="noopener" style="color:var(--blue);font-weight:500;">@${handle}</a>`;
      });
    } else {
      html = html.replace(/(^|\s)@([A-Za-z0-9_.-]+)/g, `$1<a href="#" style="color:var(--blue);font-weight:500;">@$2</a>`);
    }

    // 3. Format hashtags
    if (platform === "bluesky") {
      html = html.replace(/(^|\s)#([A-Za-z0-9_]+)/g, `$1<a href="https://bsky.app/hashtag/$2" target="_blank" rel="noopener" style="color:var(--blue);font-weight:500;">#$2</a>`);
    } else if (platform === "mastodon") {
      const inst = (cfg && cfg.crossposting && cfg.crossposting.mastodon && cfg.crossposting.mastodon.instance_url) || "https://mastodon.social";
      html = html.replace(/(^|\s)#([A-Za-z0-9_]+)/g, `$1<a href="${inst.replace(/\/+$/, "")}/tags/$2" target="_blank" rel="noopener" style="color:var(--blue);font-weight:500;">#$2</a>`);
    } else {
      html = html.replace(/(^|\s)#([A-Za-z0-9_]+)/g, `$1<span style="color:var(--blue);font-weight:500;">#$2</span>`);
    }
    
    return html;
  }

    items.forEach((el,idx)=>el.classList.toggle("tl-selected", idx===tlSelectedIndex));

  function handleGlobalKey(e){
    if(e.metaKey||e.ctrlKey||e.altKey) return;
    if(isTypingTarget(e.target)){ if(e.key==="Escape") e.target.blur(); return; }

    if(k>="1"&&k<="7"){ e.preventDefault(); navigate(KB_NAV[+k-1]); return; }

  function reauthBanner(platform, status){

  function getPlainTextLength(md) {
    if (!md) return 0;
    const plain = md
      .replace(/!\[[^\]]*\]\([^)]*\)/g, "")
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, "$1")
      .replace(/^#{1,6}\s+/gm, "")
      .replace(/(\*\*|__)(.*?)\1/g, "$2")
      .replace(/(\*|_)(.*?)\1/g, "$2")
      .replace(/`([^`]+)`/g, "$1")
      .replace(/^>\s?/gm, "")
      .trim();
    return [...plain].length;
  }

  // Rough client-side mirror of the server thread splitter (services/crosspost/thread.ts).
  // Bluesky has the tightest per-post limit, so estimate against it to show how many
  // posts a long body will thread into. Returns the estimated number of parts.
  function estimateThreadParts(md, limit) {
    if (!md || !md.trim()) return 1;
    // Build blocks: fenced code blocks stay whole; text is split on blank lines.
    const blocks = [];
    const segments = md.split(/(```[\s\S]*?```)/g);
    for (const seg of segments) {
      if (!seg) continue;
      if (seg.startsWith("```")) {
        blocks.push(seg.trim());
      } else {
        for (const p of seg.split(/\n\n+/)) {
          if (p.trim()) blocks.push(p.trim());
        }
      }
    }
    const len = (s) => [...s].length;
    let parts = 0;
    let current = "";
    const flush = () => { if (current.trim()) { parts++; current = ""; } };
    const add = (t) => { current = current ? current + "\n\n" + t : t; };
    for (const block of blocks) {
      const candidate = current ? current + "\n\n" + block : block;
      if (len(candidate) <= limit) { add(block); continue; }
      if (len(block) <= limit) { flush(); add(block); continue; }
      // Block alone exceeds the limit: split into sentences, then characters.
      flush();
      const sentences = block.match(/[^.!?]+[.!?]+(?=\s|$)|[^.!?]+$/g) || [block];
      for (const s of sentences) {
        const sentence = s.trim();
        if (!sentence) continue;
        const cand = current ? current + "\n\n" + sentence : sentence;
        if (len(cand) <= limit) { add(sentence); continue; }
        flush();
        if (len(sentence) <= limit) { add(sentence); continue; }
        parts += Math.ceil(len(sentence) / limit);
      }
    }
    flush();
    return Math.max(1, parts);
  }

  /* ---------------- composer ---------------- */
  function composer(view){
    let type="post";
    const photos=[];
    const title=h("input",{class:"titlefield",placeholder:"Title",style:"display:none"});
    const editor=h("textarea",{class:"editor",placeholder:"Hello from Macroblog. Use **Markdown** for styling, links, _and more_."});
    const count=h("span",{class:"count"},"0/300");
    const toast=h("div",{class:"toast"});
    const previewPanel=h("div",{class:"preview",style:"display:none"});
    const tags=h("input",{type:"text",placeholder:"Add tags…",class:"tags-input"});
    const sched=h("input",{type:"datetime-local"});
    const photoList=h("div",{class:"photolist"});
    let bookmarkUrl="";
    let linkBack = true;
    let selectedFolder = "";

    const THREAD_LIMIT=280;
    editor.addEventListener("input",()=>{
      const n=getPlainTextLength(editor.value);
      if(n>THREAD_LIMIT){
        const parts=estimateThreadParts(editor.value,THREAD_LIMIT);
        count.textContent=n+" · "+parts+" posts";
        count.classList.remove("over");
        count.classList.add("thread");
      }else{
        count.textContent=n+"/300";
        count.classList.remove("over","thread");
      }
    });

    const wrap=(d)=>{const s=editor.selectionStart,e=editor.selectionEnd,v=editor.value;editor.value=v.slice(0,s)+d+v.slice(s,e)+d+v.slice(e);editor.focus();editor.dispatchEvent(new Event("input"));};
    const tb=(icon,fn)=>h("button",{class:"tbtn",html:icon,onclick:fn});
    const fileInput=h("input",{type:"file",accept:"image/*,video/*",multiple:"true",style:"display:none",onchange:e=>upload(e.target.files)});
    async function upload(files){
      // Categorize current
      let imgCount = 0;
      let vidCount = 0;
      for (const p of photos) {
        if (p.url.match(/\.(mp4)/i)) vidCount++;
        else imgCount++;
      }
      
      // Categorize new files
      let newImgs = 0;
      let newVids = 0;
      for (const f of files) {
        if (f.type.startsWith("video/")) newVids++;
        else if (f.type.startsWith("image/")) newImgs++;
        else {
          toast.textContent = "Unsupported file type: " + f.type;
          toast.style.color = "#d33";
          return;
        }
      }

      if (newImgs === 0 && newVids === 0) return;

      if (vidCount + newVids > 1) {
        toast.textContent = "Error: You can only upload up to 1 video.";
        toast.style.color = "#d33";
        return;
      }
      if ((vidCount + newVids) > 0 && (imgCount + newImgs) > 0) {
        toast.textContent = "Error: Cannot combine images and video.";
        toast.style.color = "#d33";
        return;
      }
      if (imgCount + newImgs > 4) {
        toast.textContent = "Error: You can only upload up to 4 images.";
        toast.style.color = "#d33";
        return;
      }

      toast.textContent = "";
      toast.style.color = "";

      for(const f of files){
        const fd=new FormData();fd.set("file",f);
        try {
          const res = await api("/api/media",{method:"POST",body:fd});
          if (!res.ok) {
            toast.textContent = "Upload failed: " + (await res.text());
            toast.style.color = "#d33";
            continue;
          }
          const d = await res.json();
          if(!d.url) continue;
          
          const isVideo = f.type.startsWith("video/");
          const photo={url:d.url,alt:""};
          if (!isVideo && f.type.startsWith("image/")) {
            const imgObj = new Image();
            imgObj.onload = () => {
              photo.width = imgObj.naturalWidth;
              photo.height = imgObj.naturalHeight;
              URL.revokeObjectURL(imgObj.src);
            };
            imgObj.src = URL.createObjectURL(f);
          }
          photos.push(photo);
          
          const altInput=h("input",{type:"text",placeholder: isVideo ? "Describe this video (alt text)…" : "Describe this image (alt text)…",oninput:e=>{photo.alt=e.target.value;}});
          const remove=h("button",{class:"btn secondary",style:"padding:6px 10px;color:#d33",onclick:()=>{const i=photos.indexOf(photo);if(i>=0)photos.splice(i,1);row.remove();}},"✕");
          
          let previewEl;
          if (isVideo) {
            previewEl = h("video",{src:d.url,style:"width:64px;height:64px;object-fit:cover;border-radius:8px;flex:0 0 64px"});
          } else {
            previewEl = h("img",{src:d.url,alt:""});
          }
          const row=h("div",{class:"photo-edit"},previewEl,altInput,remove);
          photoList.append(row);
        } catch (err) {
          toast.textContent = "Error uploading: " + err.message;
          toast.style.color = "#d33";
        }
      }
    }
    // drag-and-drop straight onto the editor
    ["dragover","dragenter"].forEach(ev=>editor.addEventListener(ev,e=>{e.preventDefault();editor.style.borderColor="#7aa7ee";}));
    ["dragleave","drop"].forEach(ev=>editor.addEventListener(ev,e=>{e.preventDefault();editor.style.borderColor="";}));
    editor.addEventListener("drop",e=>{if(e.dataTransfer.files.length)upload(e.dataTransfer.files);});
    editor.addEventListener("paste", e => {
      if (e.clipboardData && e.clipboardData.files && e.clipboardData.files.length) {
        e.preventDefault();
        upload(e.clipboardData.files);
      }
    });

    const syndicate=new Set();
    if (!editingPostSlug) {
      if (cfg && cfg.crossposting && cfg.crossposting.bluesky && cfg.crossposting.bluesky.enabled) {
        syndicate.add("bluesky");

    // The "⋯" options menu (post type, schedule, bookmarks)

    const bookmarkUrlInput=h("input",{class:"titlefield",placeholder:"Bookmark URL",oninput:e=>bookmarkUrl=e.target.value});
    const bookmarkRow=h("div",{style:"display:none;margin-top:8px"},bookmarkUrlInput);
    
    const xp=h("div",{class:"composer-checkboxes"});
    const notConnected=(name)=>h("div",{class:"hint"},"⚠ "+name+" not connected. Reconnect in Settings.");
    
    api("/api/oauth/bluesky").then(r=>r.json()).then(d=>{
      const isDefault = cfg.crossposting && cfg.crossposting.bluesky && cfg.crossposting.bluesky.enabled;
      if(d.connected) xp.append(mkToggle("bluesky", d.needs_reauth?"🦋 Bluesky (reconnect needed)":"🦋 Bluesky", syndicate.has("bluesky")));
      else {
        syndicate.delete("bluesky");
        if(isDefault) xp.append(notConnected("Bluesky"));
      }
    });
    api("/api/oauth/mastodon").then(r=>r.json()).then(d=>{
      const isDefault = cfg.crossposting && cfg.crossposting.mastodon && cfg.crossposting.mastodon.enabled;
      if(d.connected) xp.append(mkToggle("mastodon", d.needs_reauth?"🐘 Mastodon (reconnect needed)":"🐘 Mastodon", syndicate.has("mastodon")));
      else {
        syndicate.delete("mastodon");
        if(isDefault) xp.append(notConnected("Mastodon"));
      }
    });

    const lbCb = h("input",{type:"checkbox",checked:linkBack,onchange:e=>linkBack=e.target.checked});
    const lbToggle = h("label",{class:"ck"},lbCb,"🔗 Link back");
    xp.append(lbToggle);

    const bookmarkFolderSelect = h("select",{style:"border:1px solid var(--input-border);border-radius:8px;padding:8px 10px;font-size:14px;width:100%;margin-top:4px;"});
    const loadFolders = async () => {
      bookmarkFolderSelect.innerHTML = "";
      bookmarkFolderSelect.append(h("option",{value:""},"(no folder)"));
      const r = await (await api("/api/bookmarks/folders")).json();
      for(const f of r.folders){
        const opt = h("option",{value:f.name},f.name);
        if (f.name === selectedFolder) opt.selected = true;
        bookmarkFolderSelect.append(opt);
      }
    };
    bookmarkFolderSelect.addEventListener("change", e => { selectedFolder = e.target.value; });

    const postLang = h("input", {
      type: "text",
      placeholder: "e.g. en, fr, ja",
      style: "border:1px solid var(--input-border);border-radius:8px;padding:8px 10px;font-size:14px;width:100%;margin-top:4px;",
      value: (cfg && cfg.site && cfg.site.language) || "en"
    });

    const menu=h("div",{class:"menu",style:"display:none"},
      h("div",{class:"menu-label"},"Post type"), types,
      bookmarkRow,
      h("div",{class:"menu-label", style: "margin-top:8px"},"Bookmark Folder"), bookmarkFolderSelect,
      h("div",{class:"menu-label", style: "margin-top:8px"},"Language"), postLang,
      h("div",{class:"menu-label"},"Schedule"), sched);

    const dots=h("button",{class:"dots",title:"Options",html:"⋯",onclick:()=>{menu.style.display=menu.style.display==="none"?"block":"none";}});

    const optionsRow = h("div", {class: "composer-options"},
      xp,
      h("div", {class: "composer-tags-wrapper"}, h("span", {style:"font-size:14px;color:var(--muted);margin-right:4px"},"#"), tags)
    );

    // Populate when editing
    if (editingPostSlug) {
      toast.textContent = "Loading post data…";
      api("/api/posts/" + editingPostSlug).then(r => r.json()).then(data => {
        toast.textContent = "";
        type = data.post_type;
        [...types.children].forEach((c,i)=>c.classList.toggle("on",["post","article","photo","bookmark"][i]===type));
        title.style.display = type === "article" ? "block" : "none";
        bookmarkRow.style.display = type === "bookmark" ? "block" : "none";
        
        editor.value = data.content || "";
        editor.dispatchEvent(new Event("input"));
        title.value = data.title || "";
        tags.value = (data.front_matter.categories || []).join(", ");
        if (data.front_matter.date) {
          const dObj = new Date(data.front_matter.date);
          const offset = dObj.getTimezoneOffset();
          const local = new Date(dObj.getTime() - (offset * 60 * 1000));
          sched.value = local.toISOString().slice(0, 16);
        }
        if (data.bookmark_folder) {
          selectedFolder = data.bookmark_folder;
        }
        loadFolders();

        if (data.front_matter.bookmark_url) {
          bookmarkUrl = data.front_matter.bookmark_url;
          bookmarkUrlInput.value = bookmarkUrl;
        }
        if (data.front_matter.link_back !== undefined) {
          linkBack = data.front_matter.link_back !== false;
          lbCb.checked = linkBack;
        }
        if (data.front_matter.lang) {
          postLang.value = data.front_matter.lang;
        } else {
          postLang.value = (cfg && cfg.site && cfg.site.language) || "en";
        }
        if (data.front_matter.photos) {
          for (const photo of data.front_matter.photos) {
            photos.push(photo);
            const isVideo = photo.url.match(/\.(mp4|webm|ogg|mov)$/i);
            const altInput=h("input",{type:"text",placeholder: isVideo ? "Describe this video (alt text)…" : "Describe this image (alt text)…",value:photo.alt || "",oninput:e=>{photo.alt=e.target.value;}});
            const remove=h("button",{class:"btn secondary",style:"padding:6px 10px;color:#d33",onclick:()=>{const i=photos.indexOf(photo);if(i>=0)photos.splice(i,1);row.remove();}},"✕");
            
            let previewEl;
            if (isVideo) {
              previewEl = h("video",{src:photo.url,style:"width:64px;height:64px;object-fit:cover;border-radius:8px;flex:0 0 64px"});
            } else {
              previewEl = h("img",{src:photo.url,alt:""});
            }
            const row=h("div",{class:"photo-edit"},previewEl,altInput,remove);
            photoList.append(row);
          }
        }
      });
    } else {
      loadFolders();
    }

    function submit(draft){return async()=>{
      const body={type,content:editor.value,title:title.value||undefined,
        categories:tags.value.split(",").map(s=>s.trim()).filter(Boolean),
        photos:photos.length?photos:undefined,
        bookmark_of:type==="bookmark"?bookmarkUrl:undefined,
        status:draft?"draft":"published",
        published:sched.value?new Date(sched.value).toISOString():undefined,
        syndicate_to:[...syndicate],
        link_back: linkBack,
        bookmark_folder: type==="bookmark" ? selectedFolder : undefined,
        lang: postLang.value || undefined
      };
      
      let r;
      if (editingPostSlug) {
        r = await api("/api/posts/" + editingPostSlug, {method:"PUT", json:body});
      } else {
        r = await api("/api/posts", {method:"POST", json:body});
      }

      if(r.ok){
        const p=await r.json();
        toast.textContent=(draft?"✓ Saved draft":"✓ Posted to "+host())+" — /"+p.slug;
        if (editingPostSlug) {
          editingPostSlug = null;
          setTimeout(() => navigate("posts"), 1000);
        } else {
          editor.value="";title.value="";tags.value="";photos.length=0;photoList.innerHTML="";count.textContent="0/300";count.classList.remove("over","thread");menu.style.display="none";
          postLang.value = (cfg && cfg.site && cfg.site.language) || "en";
        }
      }
      else toast.textContent="Error: "+(await r.text());
    };}

    view.append(
      h("div",{class:"post-head"},editingPostSlug ? "Edit post: " : "Post to your blog: ",h("b",{},host()), dots),
      h("div",{class:"composer"},
        menu, title, editor,
        photoList,
        optionsRow,
        h("div",{class:"toolbar"},
          tb(ICON.image,()=>fileInput.click()), tb(ICON.speaker,()=>wrap("")),
          tb(ICON.bold,()=>wrap("**")), tb(ICON.italic,()=>wrap("_")),
          tb(ICON.link,()=>{const u=prompt("Link URL");if(u){const s=editor.selectionStart,e=editor.selectionEnd,v=editor.value,txt=v.slice(s,e)||"link";editor.value=v.slice(0,s)+"["+txt+"]("+u+")"+v.slice(e);editor.dispatchEvent(new Event("input"));}}),
          count, h("div",{class:"spacer"}),
          h("button",{class:"btn secondary",onclick:togglePreview},"Preview"),
          h("button",{class:"btn secondary",onclick:submit(true)},"Save Draft"),
          h("button",{class:"btn primary",onclick:submit(false)},editingPostSlug ? "Update" : "Post")),
        previewPanel, fileInput, toast));

    function togglePreview(){
      if(previewPanel.style.display==="block"){ previewPanel.style.display="none"; return; }
      const ap=(cfg&&cfg.appearance)||{};
      previewPanel.style.fontFamily=FONT_STACKS[ap.font]||FONT_STACKS.system;
      previewPanel.style.background=ap.light_background||"#fff";
      previewPanel.style.color=ap.light_text||"#222";
      previewPanel.style.setProperty("--blue", ap.light_accent||"#1f6feb");
      let html=renderMarkdown(editor.value||"");
      if(title.value && type==="article") html="<h1 style='margin-top:0'>"+escapeHtml(title.value)+"</h1>"+html;
      for(const p of photos){ html+='<img src="'+p.url+'" alt="'+escapeHtml(p.alt||"")+'" title="'+escapeHtml(p.alt||"")+'">'; }
      previewPanel.innerHTML=html||"<p style='opacity:.5'>Nothing to preview yet.</p>";
      previewPanel.style.display="block";
    }
  }
  function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
  // Minimal Markdown → HTML for the composer preview (bold/italic/links/hashtags/images/code).
  function renderMarkdown(md){
    const blocks=String(md).split(/\n{2,}/);
    return blocks.map(block=>{
      let s=escapeHtml(block);
      s=s.replace(/!\[([^\]]*)\]\((https?:\/\/[^)\s]+|\/[^)\s]+)\)/g,(m,alt,u)=>'<img src="'+u+'" alt="'+alt+'">');
      s=s.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+|\/[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
      s=s.replace(/(^|[\s])(https?:\/\/[^\s<]+)/g,'$1<a href="$2" target="_blank" rel="noopener">$2</a>');
      s=s.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>").replace(/__([^_]+)__/g,"<strong>$1</strong>");
      s=s.replace(/(^|[^*])\*([^*\n]+)\*/g,"$1<em>$2</em>").replace(/(^|[^_\w])_([^_\n]+)_/g,"$1<em>$2</em>");
      s=s.replace(/`([^`]+)`/g,"<code>$1</code>");
      s=s.replace(/(^|\s)#([A-Za-z0-9_]+)/g,'$1<span class="hashtag">#$2</span>');
      if(/^#{1,6}\s/.test(block)){ const lvl=block.match(/^#+/)[0].length; const txt=s.replace(/^#{1,6}\s/,""); return "<h"+Math.min(lvl+1,6)+">"+txt+"</h"+Math.min(lvl+1,6)+">"; }
      return "<p>"+s.replace(/\n/g,"<br>")+"</p>";
    }).join("\n");
  }

  /* ---------------- posts ---------------- */

    view.append(h("h2",{class:"section"},"Posts"));

      }
    };
    await loadFolders();

    async function load(){
      list.innerHTML="Loading…";
      const status = statusSel.value;
      const type = typeSel.value;
      const folderId = folderSel.value;
      const q = searchInput.value.trim();
      
      let queryStr = "?limit=100";
      if (status) queryStr += "&status=" + encodeURIComponent(status);
      if (type) queryStr += "&type=" + encodeURIComponent(type);
      if (folderId) queryStr += "&folder_id=" + encodeURIComponent(folderId);
      if (q) queryStr += "&q=" + encodeURIComponent(q);
      
      const {posts}=await (await api("/api/posts"+queryStr)).json();
      currentPosts=posts;
      // Drop selections that are no longer in view.
      for(const slug of [...selected]) if(!posts.some(p=>p.slug===slug)) selected.delete(slug);
      list.innerHTML="";
      refreshBulkBar();
      if(!posts.length){list.append(h("p",{style:"color:var(--muted)"},"No posts."));return;}

      for(const p of posts){
        const socialSpan = h("span",{style:"display:inline-flex;gap:6px;align-items:center;margin-left:8px;"});
        if (p.syndications) {
          for (const s of p.syndications) {
            if (s.status === "success") {
              if (s.platform === "bluesky") {
                socialSpan.append(h("a",{href:s.remote_url,target:"_blank",title:"View on Bluesky",style:"display:inline-flex;align-items:center;"},
                  h("span",{html: blueskySvg})
                ));
              } else if (s.platform === "mastodon") {
                socialSpan.append(h("a",{href:s.remote_url,target:"_blank",title:"View on Mastodon",style:"display:inline-flex;align-items:center;"},
                  h("span",{html: mastodonSvg(p.id)})
                ));
              }
            }
          }
        }
        
        const dotColors = {published:"#2a8a4a", draft:"#8a9099", scheduled:"#ff8c00"};
        const dotColor = dotColors[p.status] || "#8a9099";
        const statusDot = h("span",{style:`display:inline-block;width:8px;height:8px;border-radius:50%;background:${dotColor};margin-right:6px;`,title:p.status});

        const folderTag = p.bookmark_folder ? h("span",{class:"tag",style:"background:var(--active);color:var(--blue-text);"},"📁 " + p.bookmark_folder) : null;

        const editBtn = h("button",{class:"btn secondary",style:"padding:6px 12px;margin-right:8px;",onclick:()=>{
          editingPostSlug = p.slug;
          navigate("composer");
        }},"Edit");

        const deleteBtn = h("button",{class:"btn secondary",style:"padding:6px 12px;color:#d33",onclick:()=>{
          const body=h("div",{},
            h("p",{style:"margin:0 0 4px"},"Delete this post? It will be removed from your site."),
            crosspostLinksNode([p]));
          showModal("Delete post", body, "Delete", async()=>{
            await api("/api/posts/"+p.slug,{method:"DELETE"});
            load();
          }, {danger:true});
        }},"Delete");

        const rowCb=h("input",{type:"checkbox",class:"selectcb",onchange:()=>{
          if(rowCb.checked) selected.add(p.slug); else selected.delete(p.slug);
          refreshBulkBar();
        }});
        rowCb.checked=selected.has(p.slug);

        const contentText = p.content || "";
        const snippet = contentText.length > 120 ? contentText.slice(0, 120) + "…" : contentText;
        
        let titleEl;
        if (p.title) {
          titleEl = h("div",{},
            h("div",{style:"font-weight:700;font-size:16px;color:var(--text);"}, p.title),
            snippet ? h("div",{style:"font-size:13.5px;color:var(--muted);margin-top:4px;white-space:pre-wrap;"}, snippet) : null
          );
        } else {
          titleEl = h("div",{style:"font-size:14.5px;color:var(--text);white-space:pre-wrap;font-weight:500;"}, snippet || `(${p.slug})`);
        }

        const cats = p.categories_json ? JSON.parse(p.categories_json) : [];
        const catsSpan = h("span",{style:"display:inline-flex;gap:4px;flex-wrap:wrap;margin-left:4px;"},
          ...cats.map(c => h("span",{class:"tag",style:"background:var(--tag-bg);color:var(--muted);"}, "#" + c))
        );

        list.append(h("div",{class:"row",style:"align-items:flex-start;padding:16px 8px;border-bottom:1px solid var(--line);display:flex;gap:12px;"},
          h("div",{style:"padding-top:3px"}, rowCb),
          h("div",{style:"flex:1;min-width:0;display:flex;flex-direction:column;gap:6px;"},
            h("div",{style:"display:flex;align-items:center;gap:6px;flex-wrap:wrap;"},
              statusDot,
              h("span",{class:"tag"},p.post_type),
              folderTag,
              catsSpan,
              socialSpan
            ),
            titleEl,
            h("div",{class:"meta",style:"font-size:12px;color:var(--muted);"}, p.status+" · "+(p.published_at||p.created_at))
          ),
          h("div",{style:"display:flex;align-items:center;gap:8px;align-self:center;"},
            editBtn,
            deleteBtn
          )
        ));
      }
    }
    load();
  }

  /* ---------------- media ---------------- */
  async function mediaView(view){
    view.append(h("h2",{class:"section"},"Uploads"));
    const {media}=await (await api("/api/media")).json();
    if(!media.length){view.append(h("p",{style:"color:var(--muted)"},"No media yet."));return;}
    const grid=h("div",{class:"grid"});
    for(const m of media){
      const cell=(m.mime_type||"").startsWith("image")?h("img",{src:m.url,title:"click to copy URL"}):h("div",{class:"card"},m.filename);
      cell.addEventListener("click",()=>{navigator.clipboard.writeText(location.origin+m.url);cell.style.outline="2px solid var(--blue)";});
      grid.append(cell);
    }
    view.append(grid);
  }

  /* ---------------- timeline (following feed) ---------------- */
  function timeAgo(iso){
    if(!iso) return "";
    const s=Math.floor((Date.now()-new Date(iso).getTime())/1000);
    if(s<60) return s+"s"; if(s<3600) return Math.floor(s/60)+"m";
    if(s<86400) return Math.floor(s/3600)+"h"; return Math.floor(s/86400)+"d";
  }
  async function timelineView(view){
    const toggleReplies = h("label",{class:"ck",style:"font-size:14.7px;user-select:none;margin-right:12px"},
      h("input",{type:"checkbox",checked:showReplies,onchange:e=>{
        showReplies = e.target.checked;
        localStorage.setItem("mb_show_replies", showReplies);
        renderTimelineList();
      }}), "Show replies");

    const searchInput = h("input",{
      type: "text",
      value: timelineSearchQuery,
      placeholder: "Search timeline…",
      style: "border:1px solid var(--input-border);border-radius:8px;padding:7px 10px;font-size:14px;flex:1;min-width:150px;",
      oninput: e => {
        timelineSearchQuery = e.target.value;
        debounceLoad();
      }
    });

    const head=h("div",{class:"viewhead"},
      h("h2",{class:"section"},"Timeline"),
      h("div",{style:"display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex:1;justify-content:flex-end;"},
        searchInput,
        toggleReplies,
        h("button",{class:"btn secondary",style:"padding:7px 14px",onclick:async()=>{
          view.innerHTML="";
          view.append(h("p",{style:"color:var(--muted)"},"Refreshing…"));
          await api("/api/timeline/refresh",{method:"POST"});
          view.innerHTML="";
          timelineView(view);
        }},"↻ Refresh")));
    view.append(head);

    const listContainer = h("div");
    view.append(listContainer);

    let data = null;
    let timelineLimit = 50;
    const debounceLoad = debounce(() => {
      timelineLimit = 50;
      loadTimelineData();
    }, 300);

    async function loadTimelineData() {
      listContainer.innerHTML = "Loading…";
      try {
        const queryStr = (timelineSearchQuery ? "?q=" + encodeURIComponent(timelineSearchQuery) : "?") + "&limit=" + timelineLimit;
        data = await (await api("/api/timeline" + queryStr)).json();
        renderTimelineList();
      } catch (e) {
        listContainer.innerHTML = "Error loading timeline.";
      }
    }

    let loadingMore = false;
    const scrollHandler = async () => {
      if (active !== "timeline") return;
      if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
        if (loadingMore) return;
        loadingMore = true;
        timelineLimit += 50;
        const spinner = h("div", { style: "text-align:center;color:var(--muted);padding:15px;" }, "Loading more posts…");
        listContainer.append(spinner);
        try {
          const queryStr = (timelineSearchQuery ? "?q=" + encodeURIComponent(timelineSearchQuery) : "?") + "&limit=" + timelineLimit;
          const res = await (await api("/api/timeline" + queryStr)).json();
          data = res;
          renderTimelineList();
        } catch (e) {
          console.error("Error loading more posts:", e);
        } finally {
          loadingMore = false;
        }
      }
    };

    if (window.mbScrollListener) {
      window.removeEventListener("scroll", window.mbScrollListener);
    }
    window.mbScrollListener = scrollHandler;
    window.addEventListener("scroll", scrollHandler);

    function renderTimelineList() {
      listContainer.innerHTML = "";
      if (!data) return;
      const b=reauthBanner("bluesky",data.bluesky); if(b)listContainer.append(b);
      const m=reauthBanner("mastodon",data.mastodon); if(m)listContainer.append(m);

      const filteredItems = data.items.filter(it => showReplies || !it.isReply);
      if(!filteredItems.length){
        const anyConn=data.bluesky.connected||data.mastodon.connected;
        listContainer.append(h("p",{style:"color:var(--muted);margin-top:10px"},
          anyConn?"No posts found.":"Connect Bluesky or Mastodon in Settings to see your following feed."));
        return;
      }
      
      for(const it of filteredItems){
        const totalPhotos = (it.media || []).length;
        const mediaClass = "tl-media grid-" + Math.min(4, totalPhotos);
        const media = (it.media && totalPhotos) ? h("div", { class: mediaClass },
          ...(it.media || []).slice(0, 4).map((mm, idx) => {
            const imgEl = h("img", {
              src: mm.url,
              alt: mm.alt || "",
              loading: "lazy",
              onclick: (e) => {
                e.preventDefault();
                e.stopPropagation();
                openLightbox(it.media, idx);
              }
            });
            
            if (idx === 3 && totalPhotos > 4) {
              const overlay = h("div", { class: "tl-media-overlay" }, `+${totalPhotos - 3}`);
              return h("div", { style: "position:relative;width:100%;height:100%;" }, imgEl, overlay);
            }
            
            return h("div", { style: "position:relative;width:100%;height:100%;" }, imgEl);
          })
        ) : null;

        let embedEl = null;
        if (it.embed) {
          if (it.embed.type === "link") {
            let domain = "";
            try {
              domain = new URL(it.embed.uri).hostname.replace("www.", "");
            } catch (e) {
              domain = it.embed.uri;
            }
            embedEl = h("a", { class: "tl-embed-link", href: it.embed.uri, target: "_blank", rel: "noopener" },
              it.embed.thumb ? h("img", { class: "tl-embed-link-thumb", src: it.embed.thumb, alt: "" }) : null,
              h("div", { class: "tl-embed-link-content" },
                h("div", { class: "tl-embed-link-title" }, it.embed.title || "Link"),
                it.embed.description ? h("div", { class: "tl-embed-link-desc" }, it.embed.description) : null,
                h("div", { class: "tl-embed-link-domain" }, domain)
              )
            );
          } else if (it.embed.type === "quote") {
            const totalQuotePhotos = (it.embed.media || []).length;
            const quoteMediaClass = "tl-media grid-" + Math.min(4, totalQuotePhotos);
            const quoteMedia = (it.embed.media && totalQuotePhotos) ? h("div", { class: quoteMediaClass, style: "margin-top:6px; height:180px;" },
              ...it.embed.media.slice(0, 4).map((mm, idx) => {
                const imgEl = h("img", {
                  src: mm.url,
                  alt: mm.alt || "",
                  loading: "lazy",
                  onclick: (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    openLightbox(it.embed.media, idx);
                  }
                });
                
                if (idx === 3 && totalQuotePhotos > 4) {
                  const overlay = h("div", { class: "tl-media-overlay", style: "font-size: 16px;" }, `+${totalQuotePhotos - 3}`);
                  return h("div", { style: "position:relative;width:100%;height:100%;" }, imgEl, overlay);
                }
                
                return h("div", { style: "position:relative;width:100%;height:100%;" }, imgEl);
              })
            ) : null;

            embedEl = h("a", { class: "tl-embed-quote", href: it.embed.url || "#", target: "_blank", rel: "noopener" },
              h("div", { class: "tl-embed-quote-header" },
                it.embed.avatar ? h("img", { class: "tl-embed-quote-avatar", src: it.embed.avatar, alt: "" }) : null,
                h("span", { class: "tl-embed-quote-author" }, it.embed.author),
                h("span", { class: "tl-embed-quote-handle" }, it.embed.authorHandle),
                h("span", { style: "color:var(--muted)" }, "·"),
                h("span", { class: "tl-embed-quote-time" }, timeAgo(it.embed.createdAt))
              ),
              h("div", { class: "tl-embed-quote-text" }, it.embed.content),
              quoteMedia
            );
          }
        }
        
        let replyOpen = false;
        const replyBox = h("textarea",{class:"replybox",rows:"2",placeholder:"Reply to this post on " + (it.platform === "bluesky" ? "Bluesky" : "Mastodon") + "…"});
        const replyStatus = h("span",{style:"font-size:13px;margin-left:8px;color:#2a8a4a"});
        const replyRow = h("div",{style:"display:none;margin-top:8px;"},
          replyBox,
          h("div",{style:"display:flex;align-items:center;margin-top:6px"},
            h("button",{class:"btn primary",style:"padding:6px 12px;font-size:13px;",onclick:async()=>{
              if(!replyBox.value.trim()) return;
              replyStatus.textContent = "Sending…";
              const r = await api("/api/timeline/" + it.id + "/reply",{method:"POST",json:{text:replyBox.value}});
              if(r.ok){
                replyStatus.textContent = "✓ Sent";
                replyBox.value = "";
                setTimeout(() => { replyRow.style.display = "none"; replyOpen = false; replyStatus.textContent = ""; }, 1500);
              } else {
                replyStatus.textContent = "✗ " + (await r.json()).error;
              }
            }}, "Send Reply"),
            replyStatus
          )
        );

        let bookmarkOpen = false;
        const bookmarkFolderSelect = h("select",{style:"border:1px solid var(--input-border);border-radius:8px;padding:6px 10px;font-size:13px;"});
        const bookmarkFolderNew = h("input",{type:"text",placeholder:"Or create new folder…",style:"border:1px solid var(--input-border);border-radius:8px;padding:6px 10px;font-size:13px;width:150px;"});
        const bookmarkStatus = h("span",{style:"font-size:13px;margin-left:8px;color:#2a8a4a"});
        
        const loadBookmarkFolders = async () => {
          bookmarkFolderSelect.innerHTML = "";
          bookmarkFolderSelect.append(h("option",{value:""},"(no folder)"));
          const folderRes = await (await api("/api/bookmarks/folders")).json();
          for(const f of folderRes.folders){
            bookmarkFolderSelect.append(h("option",{value:f.name},f.name));
          }
        };

        const bookmarkRow = h("div",{style:"display:none;margin-top:8px;gap:8px;align-items:center;flex-wrap:wrap;"},
          h("span",{style:"font-size:13px;color:var(--muted);"},"Save to Folder:"),
          bookmarkFolderSelect,
          bookmarkFolderNew,
          h("button",{class:"btn primary",style:"padding:6px 12px;font-size:13px;",onclick:async()=>{
            bookmarkStatus.textContent = "Bookmarking…";
            let folder = bookmarkFolderSelect.value;
            const newFolder = bookmarkFolderNew.value.trim();

              folder = newFolder;
            }
            const body = {
              type: "bookmark",
              content: it.content,
              bookmark_of: it.url,
              properties: {
                "bookmark-title": ["Post by " + (it.author || it.authorHandle)],
              },
              status: "published",
              bookmark_folder: folder || undefined
            };
            const r = await api("/api/posts",{method:"POST",json:body});
            if(r.ok){
              bookmarkStatus.textContent = "✓ Bookmarked";
              bookmarkFolderNew.value = "";
              setTimeout(() => { bookmarkRow.style.display = "none"; bookmarkOpen = false; bookmarkStatus.textContent = ""; }, 1500);
            } else {
              bookmarkStatus.textContent = "✗ Error: " + (await r.text());
            }
          }}, "Confirm"),
          bookmarkStatus
        );

        const replyBtn = h("button",{class:"btn secondary tl-reply-btn",style:"padding:5px 10px;font-size:13px;display:flex;align-items:center;gap:4px;",onclick:()=>{
          replyOpen = !replyOpen;
          replyRow.style.display = replyOpen ? "block" : "none";
          if (replyOpen) replyBox.focus();
        }}, "💬 Reply");

        const bookmarkBtn = h("button",{class:"btn secondary",style:"padding:5px 10px;font-size:13px;display:flex;align-items:center;gap:4px;",onclick:async()=>{
          bookmarkOpen = !bookmarkOpen;
          bookmarkRow.style.display = bookmarkOpen ? "flex" : "none";
          if (bookmarkOpen) {
            await loadBookmarkFolders();
            bookmarkFolderNew.focus();
          }
        }}, "🔖 Bookmark");

        const actionButtons = h("div",{style:"display:flex;gap:10px;margin-top:10px;align-items:center;"},
          replyBtn,
          bookmarkBtn
        );

        const itemEl = h("div",{class:"tl-item" + (it.isReply ? " is-reply" : "")},
          h("a",{href:it.url||"#",target:"_blank",rel:"noopener"},
            h("img",{class:"tl-avatar",src:it.avatar||"",alt:"",onerror:"this.style.visibility='hidden'"})
          ),
          h("div",{class:"tl-body"},
            it.isReply ? h("div",{style:"color:var(--blue);font-size:12px;font-weight:700;margin-bottom:4px;"}, "↩ Reply") : null,
            it.repostedBy?h("div",{class:"tl-repost"},"🔁 "+it.repostedBy+" reposted"):null,
            h("div",{class:"tl-meta"},
              h("a",{class:"tl-author",href:it.url||"#",target:"_blank",rel:"noopener",style:"color:var(--text);"},it.author||it.authorHandle),
              h("span",{class:"tl-handle"},it.authorHandle),
              h("span",{class:"tl-dot"},"·"),
              h("a",{class:"tl-time",href:it.url||"#",target:"_blank",rel:"noopener"}, timeAgo(it.createdAt)),
              h("span",{class:"tl-badge",html:it.platform === "bluesky" ? blueskySvg : mastodonSvg(it.id)})),
            h("div",{class:"tl-text",html:formatPostText(it.content, it.platform)}),
            (it.media&&it.media.length)?media:null,
            embedEl,
            actionButtons,
            replyRow,
            bookmarkRow)
        );
        listContainer.append(itemEl);
      }
    }

    loadTimelineData();
  }

  /* ---------------- pages ---------------- */

  async function pageEditor(view,slug){
    view.innerHTML="";
    let existing=null;
    if(slug){ existing=await (await api("/api/pages/"+slug)).json(); }
    const title=h("input",{class:"titlefield",placeholder:"Page title",value:existing?existing.title:""});
    const content=h("textarea",{class:"editor",style:"min-height:300px",placeholder:"Page content (Markdown)…"});
    if(existing) content.value=existing.content||"";
    const nav=h("input",{type:"checkbox"}); if(existing&&existing.showInNav) nav.checked=true;
    const weight=h("input",{type:"text",value:existing?String(existing.weight||0):"0",style:"width:80px;border:1px solid var(--input-border);border-radius:8px;padding:8px 10px"});
    const status=h("div",{class:"toast"});
    const saveBtn=(draft)=>async()=>{
      const body={title:title.value,content:content.value,show_in_nav:nav.checked,weight:Number(weight.value)||0,status:draft?"draft":"published"};
      let r;
      if(slug) r=await api("/api/pages/"+slug,{method:"PUT",json:body});
      else r=await api("/api/pages",{method:"POST",json:body});
      if(r.ok){ view.innerHTML=""; pagesView(view); } else { status.textContent="Error: "+(await r.text()); }
    };
    view.append(h("div",{class:"viewhead"},h("h2",{class:"section"},slug?"Edit page":"New page"),
      h("button",{class:"btn secondary",style:"padding:7px 14px",onclick:()=>{view.innerHTML="";pagesView(view);}},"← Back")),
      title, content,
      h("div",{class:"extras",style:"margin-top:12px"},
        h("label",{class:"ck"},nav,"Show in site nav"),
        h("label",{class:"ck"},"Order ",weight)),
      h("div",{style:"display:flex;gap:8px;margin-top:12px"},
        h("button",{class:"btn primary",onclick:saveBtn(false)},"Save & publish"),
        h("button",{class:"btn secondary",onclick:saveBtn(true)},"Save draft")),
      status);
  }

  /* ---------------- mentions (unified social inbox) ---------------- */
  function mentionMedia(mediaArr){
    if(!mediaArr||!mediaArr.length) return null;
    const total=mediaArr.length;
    const grid=h("div",{class:"tl-media grid-"+Math.min(4,total)});
    mediaArr.slice(0,4).forEach((mm,idx)=>{
      let el;
      if((mm.type==="video")||/\.(mp4|webm|mov|ogg)$/i.test(mm.url||"")){
        el=h("video",{src:mm.url,controls:"true",style:"width:100%;height:100%;object-fit:cover;display:block"});
      }else{
        el=h("img",{src:mm.url,alt:mm.alt||"",loading:"lazy",onclick:e=>{e.preventDefault();e.stopPropagation();openLightbox(mediaArr,idx);}});
      }
      const cell=h("div",{style:"position:relative;width:100%;height:100%;overflow:hidden;"},el);
      if(idx===3&&total>4) cell.append(h("div",{class:"tl-media-overlay"},"+"+(total-3)));
      grid.append(cell);
    });
    return grid;
  }
  function mentionEmbed(embed){
    if(!embed) return null;
    if(embed.type==="link"){
      let domain=""; try{domain=new URL(embed.uri).hostname.replace("www.","");}catch{domain=embed.uri||"";}
      return h("a",{class:"tl-embed-link",href:embed.uri,target:"_blank",rel:"noopener"},
        embed.thumb?h("img",{class:"tl-embed-link-thumb",src:embed.thumb,alt:""}):null,
        h("div",{class:"tl-embed-link-content"},
          h("div",{class:"tl-embed-link-title"},embed.title||"Link"),
          embed.description?h("div",{class:"tl-embed-link-desc"},embed.description):null,
          h("div",{class:"tl-embed-link-domain"},domain)));
    }
    if(embed.type==="quote"){

  const REASON_LABEL={mention:"mentioned you",reply:"replied",quote:"quoted you"};

  async function mentionsView(view){
    const reload=()=>{view.innerHTML="";mentionsView(view);};
    const pollBtn=h("button",{class:"btn secondary",style:"padding:7px 14px",onclick:async()=>{
      pollBtn.textContent="Polling…";pollBtn.disabled=true;

    view.append(h("div",{class:"viewhead"},h("h2",{class:"section"},"Mentions"),pollBtn));
    const [bsS,maS]=await Promise.all([api("/api/oauth/bluesky").then(r=>r.json()),api("/api/oauth/mastodon").then(r=>r.json())]);
    const bb=reauthBanner("bluesky",bsS); if(bb)view.append(bb);
    const mb=reauthBanner("mastodon",maS); if(mb)view.append(mb);
    const {webmentions,social}=await (await api("/api/mentions")).json();

    const anyConn=bsS.connected||maS.connected;

        h("div",{html:ICON.at}),
        h("p",{style:"color:var(--muted);margin:0"}, anyConn

          : "Connect Bluesky or Mastodon in Settings to pull in your mentions.")));
    }
    for(const s of social){
      const media=s.media_json?mentionMedia(JSON.parse(s.media_json)):null;
      const embed=s.embed_json?mentionEmbed(JSON.parse(s.embed_json)):null;
      const handle=s.author_handle||"";
      const limit=s.platform==="bluesky"?280:480;
      const box=h("textarea",{class:"replybox",rows:"2",placeholder:"Write a reply"+(handle?" to "+handle:"")+"… (long replies auto-thread)"});
      const hint=h("span",{class:"count",style:"font-size:12px"});
      box.addEventListener("input",()=>{const n=getPlainTextLength(box.value);if(n>limit){const parts=estimateThreadParts(box.value,limit);hint.textContent=n+" · "+parts+" posts";}else{hint.textContent=n?n+" chars":"";}});
      const st=h("span",{style:"font-size:13px;margin-left:8px"});
      const sendBtn=h("button",{class:"btn primary",style:"padding:7px 14px",onclick:async()=>{
        if(!box.value.trim()){return;}
        sendBtn.disabled=true;st.style.color="var(--muted)";st.textContent="Sending…";
        const r=await api("/api/mentions/"+s.id+"/reply",{method:"POST",json:{text:box.value}});
        if(r.ok){st.style.color="#2a8a4a";st.textContent="✓ sent";box.value="";hint.textContent="";}
        else{st.style.color="#d33";st.textContent="✗ "+((await r.json()).error||"failed");}
        sendBtn.disabled=false;
      }},"Reply");
      view.append(h("div",{class:"tl-item"},
        h("a",{href:s.url||"#",target:"_blank",rel:"noopener"},h("img",{class:"tl-avatar",src:s.avatar||"",alt:"",onerror:"this.style.visibility='hidden'"})),
        h("div",{class:"tl-body"},
          h("div",{class:"tl-meta"},
            h("a",{class:"tl-author",href:s.author_url||s.url||"#",target:"_blank",rel:"noopener",style:"color:var(--text)"},s.author||"someone"),
            handle?h("span",{class:"tl-handle"},handle):null,
            h("span",{class:"mention-reason"},REASON_LABEL[s.reason]||"mentioned you"),
            s.published?h("span",{class:"tl-time"},"· "+timeAgo(s.published)):null,
            h("span",{class:"tl-badge",html:s.platform==="bluesky"?blueskySvg:mastodonSvg("m"+s.id)}),
            s.replied?h("span",{style:"color:var(--blue);font-size:12px;margin-left:6px"},"✓ replied"):null),
          h("div",{class:"tl-text",html:formatPostText(s.content||"", s.platform)}),
          media, embed,
          h("div",{style:"margin-top:8px"}, box,
            h("div",{style:"display:flex;align-items:center;gap:10px;margin-top:6px"}, sendBtn, hint, st))
        )));
    }

    // Webmentions kept as a secondary section (incoming from other blogs).
    const pending=webmentions.filter(w=>w.status==="pending");
    if(webmentions.length){
      view.append(h("h3",{class:"sub"},"Webmentions"+(pending.length?" ("+pending.length+" pending)":"")));
      for(const w of webmentions){
        view.append(h("div",{class:"card"},
          h("div",{},h("b",{},w.author_name||w.author_url||"Anon")," — "+w.type),
          h("div",{style:"color:var(--muted);margin:4px 0"},w.content||w.source),
          w.status==="pending"?h("div",{},
            h("button",{class:"btn secondary",style:"padding:6px 12px;color:#2a8a4a;margin-right:8px",onclick:async()=>{await api("/api/webmentions/"+w.id,{method:"PATCH",json:{status:"approved"}});reload();}},"Approve"),
            h("button",{class:"btn secondary",style:"padding:6px 12px;color:#d33",onclick:async()=>{await api("/api/webmentions/"+w.id,{method:"PATCH",json:{status:"rejected"}});reload();}},"Reject"))
          :h("span",{style:"color:var(--muted)"},w.status)));
      }
    }
  }

      h("h3",{class:"sub"},"Feeds"), f("Posts per page",perPage), h("label",{class:"ck"},inclReply,"Include replies in main feed"),
      h("h3",{class:"sub"},"Webmentions"),
      h("label",{class:"ck"},wmRecv,"Receive"),h("label",{class:"ck"},wmSend,"Send"),h("label",{class:"ck"},wmMod,"Hold for moderation"),
      h("h3",{class:"sub"},"Cross-posting"),
      h("label",{class:"ck"},bsEnabled,"Bluesky enabled"),
      bs.connected ? "" : f("Bluesky handle (any handle — e.g. you.bsky.social)",bsHandle),
      h("div",{class:"field"}, bs.connected
        ? h("div",{class:"conn"+(bs.needs_reauth?" reauth":"")},
            h("span",{},bs.needs_reauth?("⚠ Reconnect needed ("+(bs.handle||"?")+")"):("✓ Connected as "+(bs.handle||"?"))),
            bs.needs_reauth?h("button",{class:"btn secondary",onclick:()=>location.href="/oauth/bluesky/connect?handle="+encodeURIComponent(bs.handle||"")},"Reconnect"):null,
            h("button",{class:"btn secondary danger",onclick:async()=>{await api("/api/oauth/bluesky/disconnect",{method:"POST"});reload();}},"Disconnect"))
        : h("button",{class:"btn secondary",onclick:()=>{const hn=(bsHandle.value||"").trim();if(!hn){toast.textContent="Enter your Bluesky handle first.";return;}location.href="/oauth/bluesky/connect?handle="+encodeURIComponent(hn);}},"Connect Bluesky")),
      h("label",{class:"ck"},mEnabled,"Mastodon enabled"),
      ma.connected ? "" : f("Mastodon instance",mInst),
      h("div",{class:"field"}, ma.connected
        ? h("div",{class:"conn"+(ma.needs_reauth?" reauth":"")},
            h("span",{},ma.needs_reauth?("⚠ Reconnect needed ("+(ma.instance||"?")+")"):("✓ Connected ("+(ma.instance||"?"))),
            ma.needs_reauth?h("button",{class:"btn secondary",onclick:()=>location.href="/oauth/mastodon/connect?instance="+encodeURIComponent(ma.instance||mInst.value)},"Reconnect"):null,
            h("button",{class:"btn secondary danger",onclick:async()=>{await api("/api/oauth/mastodon/disconnect",{method:"POST"});reload();}},"Disconnect"))
        : h("button",{class:"btn secondary",onclick:()=>{const inst=(mInst.value||"").trim();if(!inst){toast.textContent="Enter your Mastodon instance URL first.";return;}location.href="/oauth/mastodon/connect?instance="+encodeURIComponent(inst);}},"Connect Mastodon")),
      h("label",{class:"ck"},ping,"Ping Micro.blog on publish"),
      h("h3",{class:"sub"},"Theme"), f("Active theme (drop into hugo-site/themes/)",themeSel),
      h("button",{class:"btn primary",style:"margin-top:6px",onclick:save},"Save settings"),
      importSection,
      h("h3",{class:"sub"},"Security"), passwordChanger(),
      h("h3",{class:"sub"},"Backup & build"),
      h("div",{style:"display:flex;gap:10px;flex-wrap:wrap"},
        h("button",{class:"btn secondary",onclick:async()=>{const r=await fetch(API+"/api/backup",{headers:{Authorization:"Bearer "+token}});const b=await r.blob();const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="macroblog-backup.tar.gz";a.click();}},"⬇ Download backup"),
        h("button",{class:"btn secondary",onclick:async()=>{toast.textContent="Building…";const s=await (await api("/api/hugo/build",{method:"POST"})).json();renderBuildStatus(s);toast.textContent=s.lastSuccess?"✓ Built in "+s.durationMs+"ms":"Build FAILED — see log below";}},"Rebuild site")),
      buildStatusBox,
      toast);

    api("/api/hugo/status").then(r=>r.json()).then(renderBuildStatus).catch(()=>{});
    function renderBuildStatus(s){
      buildStatusBox.innerHTML="";
      if(!s||(s.lastSuccess&&!s.log)) return;
      if(s.lastSuccess){ buildStatusBox.append(h("div",{style:"color:#2a8a4a;font-size:13px;margin-top:8px"},"✓ Last build OK ("+(s.durationMs||0)+"ms)")); return; }
      buildStatusBox.append(
        h("div",{class:"banner"},"⚠ The last site build FAILED — your public site won't update until this is fixed. Hugo output:"),
        h("pre",{style:"white-space:pre-wrap;background:#0d0f12;color:#e6e6e6;padding:12px;border-radius:8px;font-size:12px;overflow:auto;max-height:300px"}, s.log||"(no output captured)"));
    }
  }
  function passwordChanger(){
    const pw=h("input",{type:"password",placeholder:"New password",style:"max-width:280px;border:1px solid var(--input-border);border-radius:9px;padding:10px 12px;font-size:15px"});
    const msg=h("span",{style:"font-size:13px;margin-left:8px"});
    return h("div",{style:"display:flex;align-items:center;gap:8px"},pw,
      h("button",{class:"btn secondary",style:"padding:9px 14px",onclick:async()=>{const r=await api("/api/password",{method:"PUT",json:{password:pw.value}});msg.textContent=r.ok?"✓ changed":"✗ "+(await r.json()).error;pw.value="";}},"Change"),msg);
  }

  boot();
  </script>
</body>
</html>
