<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Macroblog</title>
  <style>
    :root{
      --orange:#ff8c00; --blue:#3a6fd6; --blue-text:#3f7fd6; --blue-hover:#2f63c9;
      --bg:#ffffff; --side:#f6f7f9; --border:#e4e6ea; --line:#eceef1;
      --text:#222426; --muted:#8a9099; --field:#d4d8dd;
      --card:#ffffff; --card2:#fbfcfd; --hover:#eef0f3; --active:#e6ebf4;
      --input-border:#dfe2e6; --input-bg:#ffffff; --tag-bg:#eef0f3; --shadow:rgba(0,0,0,.05);
      --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color-scheme:light;
    }
    /* Dark palette. Applied automatically when the device prefers dark (unless
       the user forced light), and whenever the user explicitly picks dark. */
    :root[data-theme="dark"], :root[data-theme="dark"] *{color-scheme:dark}
    @media (prefers-color-scheme: dark){
      :root:not([data-theme="light"]){
        --blue:#5b8def; --blue-text:#7aa7ee; --blue-hover:#6b97e0;
        --bg:#15171a; --side:#1b1e22; --border:#2a2e34; --line:#23262b;
        --text:#e6e8eb; --muted:#9aa3ad; --field:#3a3f46;
        --card:#1b1e22; --card2:#202429; --hover:#23272d; --active:#2a3340;
        --input-border:#343a42; --input-bg:#1b1e22; --tag-bg:#2a2e34; --shadow:rgba(0,0,0,.4);
        color-scheme:dark;
      }
    }
    :root[data-theme="dark"]{
      --blue:#5b8def; --blue-text:#7aa7ee; --blue-hover:#6b97e0;
      --bg:#15171a; --side:#1b1e22; --border:#2a2e34; --line:#23262b;
      --text:#e6e8eb; --muted:#9aa3ad; --field:#3a3f46;
      --card:#1b1e22; --card2:#202429; --hover:#23272d; --active:#2a3340;
      --input-border:#343a42; --input-bg:#1b1e22; --tag-bg:#2a2e34; --shadow:rgba(0,0,0,.4);
      color-scheme:dark;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%}
    body{font-family:var(--sans);color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
    a{color:var(--blue-text);text-decoration:none}
    button{font-family:inherit;cursor:pointer}
    /* Make every form control theme-aware, including those created in JS. */
    input,textarea,select{background:var(--input-bg);color:var(--text)}

    /* layout */
    .shell{display:flex;min-height:100vh}
    .sidebar{width:280px;flex:0 0 280px;background:var(--side);border-right:1px solid var(--border);padding:22px 16px;display:flex;flex-direction:column;gap:6px}
    .main{flex:1;min-width:0;padding:26px 40px}

    /* brand */
    .brand{display:flex;align-items:center;gap:10px;margin:2px 4px 18px}
    .brand .mark{width:34px;height:34px;border-radius:9px;background:var(--orange);display:flex;align-items:center;justify-content:center;color:#fff}
    .brand .name{font-size:25px;font-weight:800;color:var(--orange);letter-spacing:-.5px}

    /* new post button */
    .newpost{display:flex;align-items:center;gap:10px;width:100%;background:var(--card);border:1px solid var(--input-border);border-radius:11px;padding:11px 14px;font-size:16px;font-weight:700;color:var(--text);box-shadow:0 1px 1px rgba(0,0,0,.02)}
    .newpost:hover{background:var(--hover)}

    /* account row */
    .account{display:flex;align-items:center;gap:10px;padding:14px 6px 12px}
    .account .avatar{width:38px;height:38px;border-radius:50%;object-fit:cover;background:var(--field)}
    .account .handle{font-weight:700;font-size:16px}
    .account .chev{margin-left:auto;color:var(--muted)}

    /* nav */
    .nav{display:flex;flex-direction:column;gap:2px;margin-top:2px}
    .nav a{display:flex;align-items:center;gap:13px;padding:8px 8px;border-radius:9px;color:var(--blue-text);font-size:18px;font-weight:600}
    .nav a .ic{width:22px;height:22px;display:flex;align-items:center;justify-content:center;color:var(--blue-text)}
    .nav a:hover{background:var(--hover)}
    .nav a.active{background:var(--active)}
    .nav .sep{height:1px;background:var(--border);margin:12px 6px}
    .themetoggle{margin-top:auto;display:flex;align-items:center;gap:10px;background:none;border:1px solid var(--border);border-radius:9px;padding:8px 10px;color:var(--muted);font-weight:600;font-size:14px;text-align:left}
    .themetoggle:hover{background:var(--hover)}
    .themetoggle .ic{display:flex;align-items:center;justify-content:center}
    .nav .sign-out{margin-top:8px;color:var(--muted);font-weight:600;font-size:15px}

    /* main: composer */
    .post-head{font-size:22px;margin:2px 0 16px;display:flex;align-items:center;gap:8px}
    .post-head b{font-weight:800}
    .dots{margin-left:auto;width:34px;height:34px;border-radius:50%;border:0;background:transparent;color:var(--muted);font-size:22px}
    .dots:hover{background:var(--hover)}

    .composer{max-width:1040px}
    .editor{width:100%;min-height:360px;border:1.5px solid var(--field);border-radius:14px;padding:18px 20px;font-size:21px;line-height:1.5;font-family:var(--sans);resize:vertical;outline:none;color:var(--text)}
    .editor:focus{border-color:#7aa7ee;box-shadow:0 0 0 3px rgba(58,111,214,.15)}
    .editor::placeholder{color:var(--muted)}

    .titlefield{width:100%;border:1.5px solid var(--field);border-radius:12px;padding:12px 16px;font-size:18px;margin-bottom:10px;outline:none}
    .titlefield:focus{border-color:#7aa7ee}

    .toolbar{display:flex;align-items:center;gap:10px;margin-top:14px}
    .tbtn{width:46px;height:42px;border:1px solid var(--input-border);background:var(--card);border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
    .tbtn:hover{background:var(--hover)}
    .count{color:var(--muted);font-size:16px;margin-left:6px}
    .count.over{color:#d33}
    .spacer{flex:1}
    .btn{border-radius:9px;padding:10px 20px;font-size:16px;font-weight:700;border:1px solid transparent}
    .btn.secondary{background:var(--card);border-color:var(--input-border);color:var(--text)}
    .btn.secondary:hover{background:var(--hover)}
    .btn.primary{background:var(--blue);color:#fff}
    .btn.primary:hover{background:var(--blue-hover)}
    .btn.danger{color:#d33}
    .conn{display:flex;align-items:center;gap:12px;font-size:15px;color:#2a8a4a}

    .menu{border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;background:var(--card2);box-shadow:0 4px 16px var(--shadow)}
    .menu-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:10px 0 6px}
    .menu-label:first-child{margin-top:0}
    .menu input[type=text],.menu input[type=datetime-local]{border:1px solid var(--input-border);border-radius:9px;padding:9px 11px;font-size:14px}
    .types{display:flex;gap:8px;margin:0 0 4px}
    .chip{border:1px solid var(--input-border);background:var(--card);border-radius:20px;padding:6px 14px;font-size:14px;font-weight:600;color:var(--muted)}
    .chip.on{background:var(--blue);border-color:var(--blue);color:#fff}

    .extras{display:flex;flex-wrap:wrap;gap:18px;align-items:center;margin-top:14px;color:var(--muted);font-size:14px}
    .extras label{display:flex;align-items:center;gap:6px}
    .extras input[type=text],.extras input[type=datetime-local]{border:1px solid var(--input-border);border-radius:8px;padding:7px 10px;font-size:14px}
    .toast{margin-top:14px;font-size:15px;color:#2a8a4a;min-height:20px}
    .photolist{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .photolist img{width:70px;height:70px;object-fit:cover;border-radius:8px;border:1px solid var(--border)}
    .drop{margin-top:10px;border:1.5px dashed var(--field);border-radius:12px;padding:14px;color:var(--muted);font-size:14px;text-align:center}
    .drop.hover{border-color:var(--blue);background:var(--active)}

    /* lists / panels */
    h2.section{font-size:20px;font-weight:800;margin:0 0 14px}
    h3.sub{font-size:14px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:18px 0 8px}
    .row{display:flex;align-items:center;justify-content:space-between;padding:14px 2px;border-bottom:1px solid var(--line)}
    .row .meta{color:var(--muted);font-size:13px;margin-top:3px}
    .tag{font-size:12px;background:var(--tag-bg);color:var(--muted);border-radius:6px;padding:2px 7px;margin-right:8px;font-weight:600}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;cursor:pointer;border:1px solid var(--border)}
    .card{border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
    .field{margin-bottom:12px;max-width:520px}
    .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:4px}
    .field input,.field select{width:100%;border:1px solid var(--input-border);border-radius:9px;padding:10px 12px;font-size:15px}
    .ck{display:flex;align-items:center;gap:8px;font-size:15px;margin:6px 0}
    .replybox{width:100%;border:1px solid var(--input-border);border-radius:10px;padding:8px 10px;font-size:14px;margin-top:8px;resize:vertical}
    select{font-family:inherit}

    /* login */
    .login{max-width:360px;margin:14vh auto;text-align:center}
    .login .brand{justify-content:center}
    .login input{width:100%;border:1.5px solid var(--field);border-radius:11px;padding:13px 15px;font-size:17px;margin-top:6px}
    .login input:focus{outline:none;border-color:#7aa7ee}
    .login .btn{width:100%;margin-top:14px}
    .err{color:#d33;font-size:14px;margin-top:10px;min-height:18px}

    /* shared */
    .viewhead{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .banner{background:#fff5f5;border:1px solid #f3c2c2;color:#a23;border-radius:10px;padding:10px 14px;margin:10px 0;font-size:14px}
    .banner a{color:#a23;font-weight:700;text-decoration:underline}
    .conn.reauth{color:#a23}
    .hint{font-size:13px;color:#a23;background:#fff7f0;border:1px solid #f0d8c0;border-radius:8px;padding:8px 10px;margin-top:6px}
    .logbox{background:#0d0f12;color:#d6e2ec;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;line-height:1.5;padding:14px;border-radius:10px;white-space:pre-wrap;overflow:auto;max-height:70vh;word-break:break-word}
    .colorrow{display:flex;gap:18px;flex-wrap:wrap}
    .colorrow label{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--muted)}
    .theme-preview{flex:1;min-width:170px;border:1px solid var(--border);border-radius:12px;padding:14px}
    .preview{border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-top:12px}
    .preview img{max-width:100%;border-radius:8px;margin:8px 0}
    .preview .hashtag{color:var(--blue);font-weight:600}
    .photo-edit{display:flex;gap:10px;align-items:flex-start;margin-top:8px}
    .photo-edit img{width:64px;height:64px;object-fit:cover;border-radius:8px;flex:0 0 64px}
    .photo-edit input{flex:1;border:1px solid var(--input-border);border-radius:8px;padding:8px 10px;font-size:14px}

    /* timeline */
    .tl-item{display:flex;gap:12px;padding:14px 2px;border-bottom:1px solid var(--line);color:var(--text)}
    .tl-item:hover{background:var(--hover)}
    .tl-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;background:var(--field);flex:0 0 44px}
    .tl-body{min-width:0;flex:1}
    .tl-repost{font-size:12px;color:var(--muted);margin-bottom:2px}
    .tl-meta{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;font-size:14px}
    .tl-author{font-weight:700}
    .tl-handle,.tl-dot,.tl-time{color:var(--muted)}
    .tl-badge{margin-left:auto}
    .tl-text{margin-top:3px;white-space:pre-wrap;overflow-wrap:anywhere;line-height:1.45}
    .tl-media{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:8px}
    .tl-media img{width:100%;max-height:280px;object-fit:cover;border-radius:10px;border:1px solid var(--border)}

    /* mobile chrome (hidden on desktop) */
    .topbar,.bottomnav{display:none}

    @media(max-width:760px){
      .sidebar{display:none}
      .shell{flex-direction:column}
      .main{padding:14px 14px 84px}           /* room for bottom nav */
      .topbar{display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 14px}
      .topbar .brand{margin:0}
      .topbar .name{font-size:20px}
      .topnew{width:42px;height:42px;border-radius:10px;border:1px solid var(--input-border);background:var(--card);color:var(--text);display:flex;align-items:center;justify-content:center}
      .bottomnav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:30;background:var(--bg);border-top:1px solid var(--border);padding:6px 4px env(safe-area-inset-bottom);overflow-x:auto;-webkit-overflow-scrolling:touch}
      .bottomnav .tab{flex:0 0 auto;min-width:62px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;color:var(--muted);font-size:11px;font-weight:600}
      .bottomnav .tab svg{width:24px;height:24px}
      .bottomnav .tab.active{color:var(--blue)}
      .post-head{font-size:18px}
      .editor{font-size:16px;min-height:46vh;padding:14px}     /* 16px avoids iOS zoom */
      .composer{max-width:none}
      .toolbar{gap:6px;flex-wrap:wrap}
      .tbtn{width:42px;height:40px}
      .btn{padding:10px 16px}
      .field,.field input,.field select{max-width:none}
      .titlefield,.editor,.replybox{width:100%}
      .grid{grid-template-columns:repeat(3,1fr)}
      .count{font-size:14px}
    }
    @media(max-width:380px){ .bottomnav .tab span{display:none} }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
  const API = location.origin;
  const FONT_STACKS={system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif",sans:"Helvetica,Arial,sans-serif",serif:"Georgia,'Times New Roman',serif",mono:"ui-monospace,Menlo,Consolas,monospace",rounded:"'Avenir Next','Segoe UI',system-ui,sans-serif"};
  let token = localStorage.getItem("mb_token") || "";
  let cfg = null;
  let active = "composer";
  const root = document.getElementById("app");

  /* ---------------- admin theme (light / dark) ----------------
     Defaults to "auto" (follows the device OS via prefers-color-scheme); the
     user can override to always-light or always-dark. Persisted locally. */
  const THEME_LABELS = {auto:"Auto", light:"Light", dark:"Dark"};
  let theme = localStorage.getItem("mb_theme") || "auto";
  function applyTheme(t){
    const r = document.documentElement;
    if (t === "auto") r.removeAttribute("data-theme"); else r.setAttribute("data-theme", t);
  }
  function cycleTheme(){
    theme = theme === "auto" ? "light" : theme === "light" ? "dark" : "auto";
    localStorage.setItem("mb_theme", theme);
    applyTheme(theme);
    if (token && cfg) renderApp();
  }
  function themeBtn(){
    return h("button",{class:"themetoggle",title:"Switch light / dark mode",onclick:cycleTheme},
      h("span",{class:"ic",html:ICON.theme}), "Theme: "+THEME_LABELS[theme]);
  }
  applyTheme(theme); // apply before first paint (covers the login screen too)

  // tiny dom helper
  function h(tag, attrs = {}, ...kids){
    const el = document.createElement(tag);
    for (const [k,v] of Object.entries(attrs)){
      if (k==="class") el.className=v;
      else if (k==="html") el.innerHTML=v;
      else if (k.startsWith("on")&&typeof v==="function") el.addEventListener(k.slice(2),v);
      else if (v!=null) el.setAttribute(k,v);
    }
    for (const kid of kids.flat()){ if(kid==null) continue; el.append(kid.nodeType?kid:document.createTextNode(kid)); }
    return el;
  }
  // Icons: Lucide (https://lucide.dev), ISC licensed, vendored inline so the
  // admin has one consistent icon style with no external/CDN dependency.
  const svg = (d)=>`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${d}</svg>`;
  const ICON = {
    pencil: svg('<path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/><path d="m15 5 4 4"/>'),
    posts: svg('<path d="M3 5h.01"/><path d="M3 12h.01"/><path d="M3 19h.01"/><path d="M8 5h13"/><path d="M8 12h13"/><path d="M8 19h13"/>'),
    at: svg('<circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/>'),
    image: svg('<rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>'),
    gear: svg('<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>'),
    speaker: svg('<path d="M11 4.702a.705.705 0 0 0-1.203-.498L6.413 7.587A1.4 1.4 0 0 1 5.416 8H3a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h2.416a1.4 1.4 0 0 1 .997.413l3.383 3.384A.705.705 0 0 0 11 19.298z"/><path d="M16 9a5 5 0 0 1 0 6"/><path d="M19.364 18.364a9 9 0 0 0 0-12.728"/>'),
    bold: svg('<path d="M6 12h9a4 4 0 0 1 0 8H7a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h7a4 4 0 0 1 0 8"/>'),
    italic: svg('<line x1="19" x2="10" y1="4" y2="4"/><line x1="14" x2="5" y1="20" y2="20"/><line x1="15" x2="9" y1="4" y2="20"/>'),
    link: svg('<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>'),
    chev: svg('<path d="m6 9 6 6 6-6"/>'),
    home: svg('<path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V10"/><path d="M9 21v-6h6v6"/>'),
    file: svg('<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v5h5"/><path d="M8 13h8"/><path d="M8 17h8"/>'),
    terminal: svg('<polyline points="4 17 10 11 4 5"/><line x1="12" x2="20" y1="19" y2="19"/>'),
    // Half-filled circle: represents light/dark contrast.
    theme: svg('<circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 0 0 18z" fill="currentColor"/>'),
  };

  // Client-side routing: each view maps to /admin/<slug>.
  const VIEW2SLUG={composer:"",timeline:"timeline",posts:"posts",pages:"pages",mentions:"mentions",media:"uploads",logs:"logs",settings:"settings"};
  const SLUG2VIEW={"":"composer",timeline:"timeline",posts:"posts",pages:"pages",mentions:"mentions",uploads:"media",logs:"logs",settings:"settings"};
  function viewFromPath(){ const m=location.pathname.match(/\/admin\/?(.*)$/); const slug=((m&&m[1])||"").replace(/\/+$/,""); return SLUG2VIEW[slug]||"composer"; }
  function navigate(id){ active=id; const slug=VIEW2SLUG[id]||""; const path="/admin"+(slug?"/"+slug:"/"); if(location.pathname!==path){ try{history.pushState({id},"",path);}catch(e){} } renderApp(); window.scrollTo(0,0); }
  window.addEventListener("popstate",()=>{ if(!token)return; active=viewFromPath(); renderApp(); });

  async function api(path, opts={}){
    const headers = Object.assign({Authorization:"Bearer "+token}, opts.headers||{});
    if (opts.json){ headers["content-type"]="application/json"; opts.body=JSON.stringify(opts.json); }
    const res = await fetch(API+path, {...opts, headers});
    if (res.status===401){ token=""; localStorage.removeItem("mb_token"); renderLogin(); throw new Error("unauthorized"); }
    return res;
  }

  /* ---------------- login ---------------- */
  function renderLogin(){
    root.innerHTML="";
    const pw = h("input",{type:"password",placeholder:"Password",autofocus:"true"});
    const err = h("div",{class:"err"});
    const go = async ()=>{
      const r = await fetch(API+"/api/login",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({password:pw.value})});
      if(!r.ok){ err.textContent="Incorrect password."; return; }
      token=(await r.json()).access_token; localStorage.setItem("mb_token",token); boot();
    };

  // Banner shown when a platform token has expired and needs reconnecting.
  function reauthBanner(platform, status){

  /* ---------------- composer ---------------- */
  function composer(view){
    let type="post";
    const photos=[];
    const title=h("input",{class:"titlefield",placeholder:"Title",style:"display:none"});
    const editor=h("textarea",{class:"editor",placeholder:"Hello from Macroblog. Use **Markdown** for styling, links, _and more_."});
    const count=h("span",{class:"count"},"0/300");
    const toast=h("div",{class:"toast"});
    const previewPanel=h("div",{class:"preview",style:"display:none"});
    const tags=h("input",{type:"text",placeholder:"tags, comma separated"});
    const sched=h("input",{type:"datetime-local"});
    const photoList=h("div",{class:"photolist"});
    let bookmarkUrl="";

    editor.addEventListener("input",()=>{const n=[...editor.value].length;count.textContent=n+"/300";count.classList.toggle("over",n>300);});

    const wrap=(d)=>{const s=editor.selectionStart,e=editor.selectionEnd,v=editor.value;editor.value=v.slice(0,s)+d+v.slice(s,e)+d+v.slice(e);editor.focus();editor.dispatchEvent(new Event("input"));};
    const tb=(icon,fn)=>h("button",{class:"tbtn",html:icon,onclick:fn});
    const fileInput=h("input",{type:"file",accept:"image/*",multiple:"true",style:"display:none",onchange:e=>upload(e.target.files)});
    async function upload(files){
      for(const f of files){
        const fd=new FormData();fd.set("file",f);
        const d=await (await api("/api/media",{method:"POST",body:fd})).json();
        if(!d.url) continue;
        const photo={url:d.url,alt:""};
        photos.push(photo);
        const altInput=h("input",{type:"text",placeholder:"Describe this image (alt text)…",oninput:e=>{photo.alt=e.target.value;}});
        const remove=h("button",{class:"btn secondary",style:"padding:6px 10px;color:#d33",onclick:()=>{const i=photos.indexOf(photo);if(i>=0)photos.splice(i,1);row.remove();}},"✕");
        const row=h("div",{class:"photo-edit"},h("img",{src:d.url,alt:""}),altInput,remove);
        photoList.append(row);
      }
    }
    // drag-and-drop straight onto the editor
    ["dragover","dragenter"].forEach(ev=>editor.addEventListener(ev,e=>{e.preventDefault();editor.style.borderColor="#7aa7ee";}));
    ["dragleave","drop"].forEach(ev=>editor.addEventListener(ev,e=>{e.preventDefault();editor.style.borderColor="";}));
    editor.addEventListener("drop",e=>{if(e.dataTransfer.files.length)upload(e.dataTransfer.files);});

    const syndicate=new Set();
    const mkToggle=(uid,label)=>{const cb=h("input",{type:"checkbox",onchange:e=>e.target.checked?syndicate.add(uid):syndicate.delete(uid)});return h("label",{class:"ck"},cb,label);};

    // The "⋯" options menu (post type, cross-posting, schedule, drafts) — mirrors Micro.blog.
    const types=h("div",{class:"types"},
      ...[["post","Note"],["article","Article"],["photo","Photo"],["bookmark","Bookmark"]].map(([t,l])=>
        h("button",{class:"chip"+(t===type?" on":""),onclick:()=>{type=t;[...types.children].forEach((c,i)=>c.classList.toggle("on",["post","article","photo","bookmark"][i]===t));title.style.display=t==="article"?"block":"none";bookmarkRow.style.display=t==="bookmark"?"block":"none";}},l)));
    const bookmarkRow=h("div",{style:"display:none;margin-top:8px"},h("input",{class:"titlefield",placeholder:"Bookmark URL",oninput:e=>bookmarkUrl=e.target.value}));
    const xp=h("div",{style:"margin-top:10px"});
    const notConnected=(name)=>h("div",{class:"hint"},"⚠ "+name+" is enabled but not connected. Open Settings → Cross-posting and click Connect.");
    api("/api/oauth/bluesky").then(r=>r.json()).then(d=>{
      if(d.connected) xp.append(mkToggle("bluesky", d.needs_reauth?"🦋 Bluesky — reconnect needed":"🦋 Cross-post to Bluesky"));
      else if(cfg.crossposting&&cfg.crossposting.bluesky&&cfg.crossposting.bluesky.enabled) xp.append(notConnected("Bluesky"));
    });
    api("/api/oauth/mastodon").then(r=>r.json()).then(d=>{
      if(d.connected) xp.append(mkToggle("mastodon", d.needs_reauth?"🐘 Mastodon — reconnect needed":"🐘 Cross-post to Mastodon"));
      else if(cfg.crossposting&&cfg.crossposting.mastodon&&cfg.crossposting.mastodon.enabled) xp.append(notConnected("Mastodon"));
    });

    const menu=h("div",{class:"menu",style:"display:none"},
      h("div",{class:"menu-label"},"Post type"), types,
      bookmarkRow,
      h("div",{class:"menu-label"},"Tags"), tags,
      h("div",{class:"menu-label"},"Schedule"), sched,
      xp,
      h("div",{style:"margin-top:12px;display:flex;gap:8px"},
        h("button",{class:"btn secondary",style:"padding:8px 14px",onclick:submit(true)},"Save as draft")),
      photoList);

    const dots=h("button",{class:"dots",title:"Options",html:"⋯",onclick:()=>{menu.style.display=menu.style.display==="none"?"block":"none";}});

    function submit(draft){return async()=>{
      const body={type,content:editor.value,title:title.value||undefined,
        categories:tags.value.split(",").map(s=>s.trim()).filter(Boolean),
        photos:photos.length?photos:undefined,
        bookmark_of:type==="bookmark"?bookmarkUrl:undefined,
        status:draft?"draft":"published",
        published:sched.value?new Date(sched.value).toISOString():undefined,
        syndicate_to:[...syndicate]};
      const r=await api("/api/posts",{method:"POST",json:body});
      if(r.ok){const p=await r.json();toast.textContent=(draft?"✓ Saved draft":"✓ Posted to "+host())+" — /"+p.slug;editor.value="";title.value="";tags.value="";photos.length=0;photoList.innerHTML="";count.textContent="0/300";menu.style.display="none";}
      else toast.textContent="Error: "+(await r.text());
    };}

    view.append(
      h("div",{class:"post-head"},"Post to your blog: ",h("b",{},host()), dots),
      h("div",{class:"composer"},
        menu, title, editor,
        h("div",{class:"toolbar"},
          tb(ICON.image,()=>fileInput.click()), tb(ICON.speaker,()=>wrap("")),
          tb(ICON.bold,()=>wrap("**")), tb(ICON.italic,()=>wrap("_")),
          tb(ICON.link,()=>{const u=prompt("Link URL");if(u){const s=editor.selectionStart,e=editor.selectionEnd,v=editor.value,txt=v.slice(s,e)||"link";editor.value=v.slice(0,s)+"["+txt+"]("+u+")"+v.slice(e);editor.dispatchEvent(new Event("input"));}}),
          count, h("div",{class:"spacer"}),
          h("button",{class:"btn secondary",onclick:togglePreview},"Preview"),
          h("button",{class:"btn primary",onclick:submit(false)},"Post")),
        previewPanel, fileInput, toast));

    function togglePreview(){
      if(previewPanel.style.display==="block"){ previewPanel.style.display="none"; return; }
      const ap=(cfg&&cfg.appearance)||{};
      previewPanel.style.fontFamily=FONT_STACKS[ap.font]||FONT_STACKS.system;
      previewPanel.style.background=ap.light_background||"#fff";
      previewPanel.style.color=ap.light_text||"#222";
      previewPanel.style.setProperty("--blue", ap.light_accent||"#1f6feb");
      let html=renderMarkdown(editor.value||"");
      if(title.value && type==="article") html="<h1 style='margin-top:0'>"+escapeHtml(title.value)+"</h1>"+html;
      for(const p of photos){ html+='<img src="'+p.url+'" alt="'+escapeHtml(p.alt||"")+'" title="'+escapeHtml(p.alt||"")+'">'; }
      previewPanel.innerHTML=html||"<p style='opacity:.5'>Nothing to preview yet.</p>";
      previewPanel.style.display="block";
    }
  }
  function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
  // Minimal Markdown → HTML for the composer preview (bold/italic/links/hashtags/images/code).
  function renderMarkdown(md){
    const blocks=String(md).split(/\n{2,}/);
    return blocks.map(block=>{
      let s=escapeHtml(block);
      // images ![alt](url)
      s=s.replace(/!\[([^\]]*)\]\((https?:\/\/[^)\s]+|\/[^)\s]+)\)/g,(m,alt,u)=>'<img src="'+u+'" alt="'+alt+'">');
      // links [text](url)
      s=s.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+|\/[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
      // bare urls (not already inside an attribute or anchor text)
      s=s.replace(/(^|[\s])(https?:\/\/[^\s<]+)/g,'$1<a href="$2" target="_blank" rel="noopener">$2</a>');
      // bold then italic then inline code
      s=s.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>").replace(/__([^_]+)__/g,"<strong>$1</strong>");
      s=s.replace(/(^|[^*])\*([^*\n]+)\*/g,"$1<em>$2</em>").replace(/(^|[^_\w])_([^_\n]+)_/g,"$1<em>$2</em>");
      s=s.replace(/`([^`]+)`/g,"<code>$1</code>");
      // hashtags
      s=s.replace(/(^|\s)#([A-Za-z0-9_]+)/g,'$1<span class="hashtag">#$2</span>');
      // headings
      if(/^#{1,6}\s/.test(block)){ const lvl=block.match(/^#+/)[0].length; const txt=s.replace(/^#{1,6}\s/,""); return "<h"+Math.min(lvl+1,6)+">"+txt+"</h"+Math.min(lvl+1,6)+">"; }
      return "<p>"+s.replace(/\n/g,"<br>")+"</p>";
    }).join("\n");
  }

  /* ---------------- posts ---------------- */
  async function postsView(view){
    view.append(h("h2",{class:"section"},"Posts"));
    const sel=h("select",{onchange:()=>load(sel.value),style:"margin-bottom:14px;border:1px solid var(--input-border);border-radius:8px;padding:7px 10px"},
      ...["","published","draft","scheduled"].map(s=>h("option",{value:s},s||"all")));
    const list=h("div"); view.append(sel,list);
    async function load(status){
      list.innerHTML="Loading…";
      const {posts}=await (await api("/api/posts"+(status?"?status="+status:""))).json();
      list.innerHTML="";
      if(!posts.length){list.append(h("p",{style:"color:var(--muted)"},"No posts."));return;}
      for(const p of posts){
        list.append(h("div",{class:"row"},
          h("div",{}, h("span",{class:"tag"},p.post_type), h("span",{},p.title||p.slug),
            h("div",{class:"meta"},p.status+" · "+(p.published_at||p.created_at))),
          h("button",{class:"btn secondary",style:"padding:6px 12px;color:#d33",onclick:async()=>{if(confirm("Delete this post?")){await api("/api/posts/"+p.slug,{method:"DELETE"});load(sel.value);}}},"Delete")));
      }
    }
    load("");
  }

  /* ---------------- media ---------------- */
  async function mediaView(view){
    view.append(h("h2",{class:"section"},"Uploads"));
    const {media}=await (await api("/api/media")).json();
    if(!media.length){view.append(h("p",{style:"color:var(--muted)"},"No media yet."));return;}
    const grid=h("div",{class:"grid"});
    for(const m of media){
      const cell=(m.mime_type||"").startsWith("image")?h("img",{src:m.url,title:"click to copy URL"}):h("div",{class:"card"},m.filename);
      cell.addEventListener("click",()=>{navigator.clipboard.writeText(location.origin+m.url);cell.style.outline="2px solid var(--blue)";});
      grid.append(cell);
    }
    view.append(grid);
  }

  /* ---------------- timeline (following feed) ---------------- */
  function timeAgo(iso){
    if(!iso) return "";
    const s=Math.floor((Date.now()-new Date(iso).getTime())/1000);
    if(s<60) return s+"s"; if(s<3600) return Math.floor(s/60)+"m";
    if(s<86400) return Math.floor(s/3600)+"h"; return Math.floor(s/86400)+"d";
  }
  async function timelineView(view){
    const head=h("div",{class:"viewhead"},h("h2",{class:"section"},"Timeline"),
      h("button",{class:"btn secondary",style:"padding:7px 14px",onclick:async()=>{view.innerHTML="";view.append(h("p",{style:"color:var(--muted)"},"Refreshing…"));await api("/api/timeline/refresh",{method:"POST"});view.innerHTML="";timelineView(view);}},"↻ Refresh"));
    view.append(head);
    const data=await (await api("/api/timeline")).json();
    const b=reauthBanner("bluesky",data.bluesky); if(b)view.append(b);
    const m=reauthBanner("mastodon",data.mastodon); if(m)view.append(m);

    if(!data.items.length){
      const anyConn=data.bluesky.connected||data.mastodon.connected;
      view.append(h("p",{style:"color:var(--muted);margin-top:10px"},
        anyConn?"No posts yet — tap Refresh in a moment.":"Connect Bluesky or Mastodon in Settings to see your following feed."));
      return;
    }
    const badge={bluesky:"🦋",mastodon:"🐘"};
    for(const it of data.items){
      const media=h("div",{class:"tl-media"},...(it.media||[]).slice(0,4).map(mm=>h("img",{src:mm.url,alt:mm.alt||"",loading:"lazy"})));
      view.append(h("a",{class:"tl-item",href:it.url||"#",target:"_blank",rel:"noopener"},
        h("img",{class:"tl-avatar",src:it.avatar||"",alt:"",onerror:"this.style.visibility='hidden'"}),
        h("div",{class:"tl-body"},
          it.repostedBy?h("div",{class:"tl-repost"},"🔁 "+it.repostedBy+" reposted"):null,
          h("div",{class:"tl-meta"},h("span",{class:"tl-author"},it.author||it.authorHandle),
            h("span",{class:"tl-handle"},it.authorHandle),
            h("span",{class:"tl-dot"},"·"),h("span",{class:"tl-time"},timeAgo(it.createdAt)),
            h("span",{class:"tl-badge"},badge[it.platform]||"")),
          h("div",{class:"tl-text"},it.content||""),
          (it.media&&it.media.length)?media:null)));
    }
  }

  async function pageEditor(view,slug){
    view.innerHTML="";
    let existing=null;
    if(slug){ existing=await (await api("/api/pages/"+slug)).json(); }
    const title=h("input",{class:"titlefield",placeholder:"Page title",value:existing?existing.title:""});
    const content=h("textarea",{class:"editor",style:"min-height:300px",placeholder:"Page content (Markdown)…"});
    if(existing) content.value=existing.content||"";
    const nav=h("input",{type:"checkbox"}); if(existing&&existing.showInNav) nav.checked=true;
    const weight=h("input",{type:"text",value:existing?String(existing.weight||0):"0",style:"width:80px;border:1px solid var(--input-border);border-radius:8px;padding:8px 10px"});
    const status=h("div",{class:"toast"});
    const saveBtn=(draft)=>async()=>{
      const body={title:title.value,content:content.value,show_in_nav:nav.checked,weight:Number(weight.value)||0,status:draft?"draft":"published"};
      let r;
      if(slug) r=await api("/api/pages/"+slug,{method:"PUT",json:body});
      else r=await api("/api/pages",{method:"POST",json:body});
      if(r.ok){ view.innerHTML=""; pagesView(view); } else { status.textContent="Error: "+(await r.text()); }
    };
    view.append(h("div",{class:"viewhead"},h("h2",{class:"section"},slug?"Edit page":"New page"),
      h("button",{class:"btn secondary",style:"padding:7px 14px",onclick:()=>{view.innerHTML="";pagesView(view);}},"← Back")),
      title, content,
      h("div",{class:"extras",style:"margin-top:12px"},
        h("label",{class:"ck"},nav,"Show in site nav"),
        h("label",{class:"ck"},"Order ",weight)),
      h("div",{style:"display:flex;gap:8px;margin-top:12px"},
        h("button",{class:"btn primary",onclick:saveBtn(false)},"Save & publish"),
        h("button",{class:"btn secondary",onclick:saveBtn(true)},"Save draft")),
      status);
  }

  /* ---------------- mentions ---------------- */

      view.append(h("div",{class:"card"},
        h("div",{},h("b",{},w.author_name||w.author_url||"Anon")," — "+w.type),
        h("div",{style:"color:var(--muted);margin:4px 0"},w.content||w.source),
        w.status==="pending"?h("div",{},
          h("button",{class:"btn secondary",style:"padding:6px 12px;color:#2a8a4a;margin-right:8px",onclick:async()=>{await api("/api/webmentions/"+w.id,{method:"PATCH",json:{status:"approved"}});reload();}},"Approve"),
          h("button",{class:"btn secondary",style:"padding:6px 12px;color:#d33",onclick:async()=>{await api("/api/webmentions/"+w.id,{method:"PATCH",json:{status:"rejected"}});reload();}},"Reject"))
        :h("span",{style:"color:var(--muted)"},w.status)));
    }
  }

  /* ---------------- logs ---------------- */
  async function logsView(view){
    const pre=h("pre",{class:"logbox"},"Loading…");
    const status=h("span",{style:"font-size:13px;margin-left:8px;color:#2a8a4a"});
    const load=async()=>{ const t=await (await api("/api/logs")).text(); pre.textContent=t; pre.scrollTop=pre.scrollHeight; };
    view.append(h("div",{class:"viewhead"},h("h2",{class:"section"},"Logs"),
      h("div",{style:"display:flex;gap:8px;flex-wrap:wrap"},
        h("button",{class:"btn primary",style:"padding:7px 14px",onclick:async()=>{
          try{ await navigator.clipboard.writeText(pre.textContent||""); status.textContent="✓ Copied"; }
          catch{ const r=document.createRange(); r.selectNodeContents(pre); const s=getSelection(); s.removeAllRanges(); s.addRange(r); document.execCommand("copy"); status.textContent="✓ Copied"; }
          setTimeout(()=>status.textContent="",2000);
        }},"Copy logs"),
        h("button",{class:"btn secondary",style:"padding:7px 14px",onclick:load},"↻ Refresh"),
        h("button",{class:"btn secondary",style:"padding:7px 14px;color:#d33",onclick:async()=>{await api("/api/logs",{method:"DELETE"});load();}},"Clear"),
        status)));
    view.append(h("p",{style:"color:var(--muted);font-size:14px;margin:2px 0 10px"},"Everything happening on the server: Hugo builds, cross-posting, webmentions, requests."),
      pre);
    load();
  }

  /* ---------------- settings ---------------- */
  async function settingsView(view){
    const c=await (await api("/api/config")).json();
    cfg=c;
    const toast=h("div",{class:"toast"});
    const buildStatusBox=h("div");
    const f=(label,el)=>h("div",{class:"field"},h("label",{},label),el);
    const inp=v=>h("input",{type:"text",value:v??""});
    const chk=v=>{const x=h("input",{type:"checkbox"});x.checked=!!v;return x;};

    const title=inp(c.site.title),desc=inp(c.site.description),author=inp(c.site.author),username=inp(c.site.username),url=inp(c.site.url);
    const perPage=inp(c.feeds.posts_per_page),inclReply=chk(c.feeds.include_reply_type);
    const wmRecv=chk(c.webmentions.receive),wmSend=chk(c.webmentions.send),wmMod=chk(c.webmentions.moderation);
    const bsEnabled=chk(c.crossposting.bluesky.enabled),bsHandle=inp(c.crossposting.bluesky.handle);
    const mEnabled=chk(c.crossposting.mastodon.enabled),mInst=inp(c.crossposting.mastodon.instance_url);
    const ping=chk(c.microblog.ping_enabled);

    // Appearance: avatar + font + colours
    const ap=c.appearance||{font:"system",accent_color:"#111111",background_color:"#ffffff",text_color:"#222426"};
    let avatarUrl=c.site.avatar||"";
    const avatarImg=h("img",{src:avatarUrl,alt:"",style:"width:64px;height:64px;border-radius:50%;object-fit:cover;background:#eee",onerror:"this.style.visibility='hidden'"});
    const avatarFile=h("input",{type:"file",accept:"image/*",style:"display:none",onchange:async e=>{
      const fl=e.target.files[0]; if(!fl) return; const fd=new FormData(); fd.set("file",fl);
      const d=await (await api("/api/media",{method:"POST",body:fd})).json();
      if(d.url){ avatarUrl=d.url; avatarImg.src=d.url; avatarImg.style.visibility="visible"; }
    }});
    const fontSel=h("select",{},...[["system","System default"],["sans","Sans-serif"],["serif","Serif"],["mono","Monospace"],["rounded","Rounded"]].map(([v,l])=>{const o=h("option",{value:v},l);if(v===ap.font)o.selected=true;return o;}));
    const modeSel=h("select",{},...[["auto","Auto (follow device)"],["light","Always light"],["dark","Always dark"]].map(([v,l])=>{const o=h("option",{value:v},l);if(v===(ap.mode||"auto"))o.selected=true;return o;}));
    const colorInput=v=>h("input",{type:"color",value:v||"#000000",style:"width:48px;height:34px;border:1px solid var(--input-border);border-radius:8px;padding:2px;background:var(--input-bg)"});
    const fontStacks={system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif",sans:"Helvetica,Arial,sans-serif",serif:"Georgia,'Times New Roman',serif",mono:"ui-monospace,Menlo,Consolas,monospace",rounded:"'Avenir Next','Segoe UI',system-ui,sans-serif"};
    const lAccent=colorInput(ap.light_accent),lBg=colorInput(ap.light_background),lTxt=colorInput(ap.light_text);
    const dAccent=colorInput(ap.dark_accent),dBg=colorInput(ap.dark_background),dTxt=colorInput(ap.dark_text);
    // Live preview of both modes
    const previewCard=(label,acc,b,t)=>{const card=h("div",{class:"theme-preview",style:"background:"+b+";color:"+t+";font-family:"+fontStacks[fontSel.value]});
      card.append(h("div",{style:"font-size:12px;opacity:.7;margin-bottom:6px"},label),
        h("div",{style:"font-weight:700;font-size:16px"},c.site.title||"Your Blog"),
        h("div",{style:"font-size:13px;margin:4px 0"},"A sample post with a ",h("a",{style:"color:"+acc},"link"),"."),
        h("button",{style:"background:"+acc+";color:"+b+";border:0;border-radius:6px;padding:4px 10px;font-size:12px"},"Button"));
      return card;};
    const previewWrap=h("div",{style:"display:flex;gap:12px;flex-wrap:wrap;margin-top:8px"});
    const renderPreview=()=>{previewWrap.innerHTML="";previewWrap.append(previewCard("Light",lAccent.value,lBg.value,lTxt.value),previewCard("Dark",dAccent.value,dBg.value,dTxt.value));};
    [lAccent,lBg,lTxt,dAccent,dBg,dTxt,fontSel].forEach(el=>el.addEventListener("input",renderPreview));
    renderPreview();

    const themes=await (await api("/api/themes")).json();
    const themeSel=h("select",{},h("option",{value:""},"(default)"),...themes.themes.map(t=>{const o=h("option",{value:t},t);if(t===themes.active)o.selected=true;return o;}));
    const bs=await (await api("/api/oauth/bluesky")).json();
    const ma=await (await api("/api/oauth/mastodon")).json();

    const save=async()=>{
      await api("/api/config",{method:"PUT",json:{
        site:{title:title.value,description:desc.value,author:author.value,username:username.value,url:url.value,avatar:avatarUrl},
        feeds:{posts_per_page:Number(perPage.value),include_reply_type:inclReply.checked},
        webmentions:{receive:wmRecv.checked,send:wmSend.checked,moderation:wmMod.checked},
        crossposting:{bluesky:{enabled:bsEnabled.checked,handle:bsHandle.value},mastodon:{enabled:mEnabled.checked,instance_url:mInst.value}},
        microblog:{ping_enabled:ping.checked}, hugo:{theme:themeSel.value},
        appearance:{font:fontSel.value,mode:modeSel.value,
          light_accent:lAccent.value,light_background:lBg.value,light_text:lTxt.value,
          dark_accent:dAccent.value,dark_background:dBg.value,dark_text:dTxt.value}}});
      toast.textContent="✓ Saved. Rebuilding…";
      const s=await (await api("/api/hugo/build",{method:"POST"})).json();
      toast.textContent=s.lastSuccess?"✓ Saved & rebuilt — refresh your site to see changes.":"Saved, but rebuild failed (see Backup & build below).";
    };
    const reload=()=>{view.innerHTML="";settingsView(view);};

    view.append(h("h2",{class:"section"},"Settings"),
      h("h3",{class:"sub"},"Site"),
      f("Title",title),f("Description",desc),f("Author",author),f("Username",username),f("Public URL",url),
      h("h3",{class:"sub"},"Appearance"),
      h("div",{class:"field"},h("label",{},"Profile photo"),
        h("div",{style:"display:flex;align-items:center;gap:12px"}, avatarImg,
          h("button",{class:"btn secondary",style:"padding:8px 14px",onclick:()=>avatarFile.click()},"Upload photo"), avatarFile)),
      f("Font",fontSel),
      f("Light / dark mode",modeSel),
      h("div",{class:"field"},h("label",{},"Light mode colours"),
        h("div",{class:"colorrow"},
          h("label",{},lAccent,"Accent"),h("label",{},lBg,"Background"),h("label",{},lTxt,"Text"))),
      h("div",{class:"field"},h("label",{},"Dark mode colours"),
        h("div",{class:"colorrow"},
          h("label",{},dAccent,"Accent"),h("label",{},dBg,"Background"),h("label",{},dTxt,"Text"))),
      h("div",{class:"field"},h("label",{},"Preview"),previewWrap),
      h("h3",{class:"sub"},"Feeds"), f("Posts per page",perPage), h("label",{class:"ck"},inclReply,"Include replies in main feed"),
      h("h3",{class:"sub"},"Webmentions"),
      h("label",{class:"ck"},wmRecv,"Receive"),h("label",{class:"ck"},wmSend,"Send"),h("label",{class:"ck"},wmMod,"Hold for moderation"),
      h("h3",{class:"sub"},"Cross-posting"),
      h("label",{class:"ck"},bsEnabled,"Bluesky enabled"),
      bs.connected ? "" : f("Bluesky handle (any handle — e.g. you.bsky.social)",bsHandle),
      h("div",{class:"field"}, bs.connected
        ? h("div",{class:"conn"+(bs.needs_reauth?" reauth":"")},
            h("span",{},bs.needs_reauth?("⚠ Reconnect needed ("+(bs.handle||"?")+")"):("✓ Connected as "+(bs.handle||"?"))),
            bs.needs_reauth?h("button",{class:"btn secondary",onclick:()=>location.href="/oauth/bluesky/connect?handle="+encodeURIComponent(bs.handle||"")},"Reconnect"):null,
            h("button",{class:"btn secondary danger",onclick:async()=>{await api("/api/oauth/bluesky/disconnect",{method:"POST"});reload();}},"Disconnect"))
        : h("button",{class:"btn secondary",onclick:()=>{const hn=(bsHandle.value||"").trim();if(!hn){toast.textContent="Enter your Bluesky handle first.";return;}location.href="/oauth/bluesky/connect?handle="+encodeURIComponent(hn);}},"Connect Bluesky")),
      h("label",{class:"ck"},mEnabled,"Mastodon enabled"),
      ma.connected ? "" : f("Mastodon instance",mInst),
      h("div",{class:"field"}, ma.connected
        ? h("div",{class:"conn"+(ma.needs_reauth?" reauth":"")},
            h("span",{},ma.needs_reauth?("⚠ Reconnect needed ("+(ma.instance||"?")+")"):("✓ Connected ("+(ma.instance||"?")+")")),
            ma.needs_reauth?h("button",{class:"btn secondary",onclick:()=>location.href="/oauth/mastodon/connect?instance="+encodeURIComponent(ma.instance||mInst.value)},"Reconnect"):null,
            h("button",{class:"btn secondary danger",onclick:async()=>{await api("/api/oauth/mastodon/disconnect",{method:"POST"});reload();}},"Disconnect"))
        : h("button",{class:"btn secondary",onclick:()=>{const inst=(mInst.value||"").trim();if(!inst){toast.textContent="Enter your Mastodon instance URL first.";return;}location.href="/oauth/mastodon/connect?instance="+encodeURIComponent(inst);}},"Connect Mastodon")),
      h("label",{class:"ck"},ping,"Ping Micro.blog on publish"),
      h("h3",{class:"sub"},"Theme"), f("Active theme (drop into hugo-site/themes/)",themeSel),
      h("button",{class:"btn primary",style:"margin-top:6px",onclick:save},"Save settings"),
      h("h3",{class:"sub"},"Security"), passwordChanger(),
      h("h3",{class:"sub"},"Backup & build"),
      h("div",{style:"display:flex;gap:10px;flex-wrap:wrap"},
        h("button",{class:"btn secondary",onclick:async()=>{const r=await fetch(API+"/api/backup",{headers:{Authorization:"Bearer "+token}});const b=await r.blob();const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="macroblog-backup.tar.gz";a.click();}},"⬇ Download backup"),
        h("button",{class:"btn secondary",onclick:async()=>{toast.textContent="Building…";const s=await (await api("/api/hugo/build",{method:"POST"})).json();renderBuildStatus(s);toast.textContent=s.lastSuccess?"✓ Built in "+s.durationMs+"ms":"Build FAILED — see log below";}},"Rebuild site")),
      buildStatusBox,
      toast);

    // Show the latest build status (and the error log if the last build failed).
    api("/api/hugo/status").then(r=>r.json()).then(renderBuildStatus).catch(()=>{});
    function renderBuildStatus(s){
      buildStatusBox.innerHTML="";
      if(!s||(s.lastSuccess&&!s.log)) return;
      if(s.lastSuccess){ buildStatusBox.append(h("div",{style:"color:#2a8a4a;font-size:13px;margin-top:8px"},"✓ Last build OK ("+(s.durationMs||0)+"ms)")); return; }
      buildStatusBox.append(
        h("div",{class:"banner"},"⚠ The last site build FAILED — your public site won't update until this is fixed. Hugo output:"),
        h("pre",{style:"white-space:pre-wrap;background:#0d0f12;color:#e6e6e6;padding:12px;border-radius:8px;font-size:12px;overflow:auto;max-height:300px"}, s.log||"(no output captured)"));
    }
  }
  function passwordChanger(){
    const pw=h("input",{type:"password",placeholder:"New password",style:"max-width:280px;border:1px solid var(--input-border);border-radius:9px;padding:10px 12px;font-size:15px"});
    const msg=h("span",{style:"font-size:13px;margin-left:8px"});
    return h("div",{style:"display:flex;align-items:center;gap:8px"},pw,
      h("button",{class:"btn secondary",style:"padding:9px 14px",onclick:async()=>{const r=await api("/api/password",{method:"PUT",json:{password:pw.value}});msg.textContent=r.ok?"✓ changed":"✗ "+(await r.json()).error;pw.value="";}},"Change"),msg);
  }

  boot();
  </script>
</body>
</html>
