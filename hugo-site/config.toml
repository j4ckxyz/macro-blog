baseURL = "http://127.0.0.1:3000/"
languageCode = "en"
title = "Macroblog"
enableEmoji = true
summaryLength = 30

[params]
  avatar = "/uploads/avatar.jpg"
  description = "A Macroblog."
  theme_seconds = ""
  twitter_username = ""
  github_username = ""
  include_reply_type = false
  [params.author]
    name = "Author"
    username = "author"
  [params.appearance]
    font = "system"
    accentcolor = "#111111"
    bgcolor = "#ffffff"
    textcolor = "#222426"

[taxonomies]
  category = "categories"
  tag = "tags"

# Filenames are written as "<slug>.md", so :contentbasename is always the slug —
# this stays correct even for untitled microblog posts (empty title).
# (:contentbasename replaces the deprecated :filename token.)
[permalinks]
  posts = "/:year/:month/:day/:contentbasename/"
  articles = "/:year/:month/:day/:contentbasename/"
  photos = "/:year/:month/:day/:contentbasename/"
  replies = "/:year/:month/:day/:contentbasename/"
  bookmarks = "/:year/:month/:day/:contentbasename/"
  podcasts = "/:year/:month/:day/:contentbasename/"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[outputFormats]
  [outputFormats.JSON]
    mediaType = "application/json"
    baseName = "feed"
    isPlainText = true
    rel = "alternate"
  [outputFormats.RSS]
    mediaType = "application/rss+xml"
    baseName = "feed"
    rel = "alternate"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false

[security]
  [security.exec]
    allow = ['^(dart-)?sass(-embedded)?$', '^go$', '^npx$', '^postcss$', '^hugo$']
  [security.funcs]
    getenv = ['^HUGO_', '^CI$']
