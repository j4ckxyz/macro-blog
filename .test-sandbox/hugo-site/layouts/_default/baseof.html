<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title | default .Site.Title }} — {{ .Site.Title }}{{ end }}</title>
  {{ partial "head.html" . }}
  {{ $css := .Site.Params.theme_seconds }}
  <link rel="stylesheet" href="{{ .Site.BaseURL }}css/style.css{{ with $css }}?v={{ . }}{{ end }}" />
  {{ block "head" . }}{{ end }}
</head>
<body>
  <header class="site-header">
    <nav class="bar">
      <a class="site-name" href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a>
      <span class="nav-links">
        <a href="{{ .Site.BaseURL }}archive/">Archive</a>
        <a href="{{ .Site.BaseURL }}photos/">Photos</a>
        <a href="{{ .Site.BaseURL }}feed.xml">Feed</a>
      </span>
    </nav>
  </header>
  <main class="content">
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="site-footer">
    <p>{{ .Site.Params.author.name }} · Powered by Macroblog</p>
  </footer>
</body>
</html>
