{{- /* Compact h-entry used in feeds/lists. */ -}}
<article class="h-entry post-summary post-{{ .Params.type | default "post" }}">
  {{ if .Title }}<h2 class="p-name"><a class="u-url" href="{{ .Permalink }}">{{ .Title }}</a></h2>{{ end }}
  <div class="e-content">
    {{ with .Params.photos }}
    <div class="photos">{{ range . }}<img class="u-photo" src="{{ .url }}" alt="{{ .alt }}" loading="lazy" />{{ end }}</div>
    {{ end }}
    {{ .Content }}
  </div>
  <a class="u-url permalink" href="{{ .Permalink }}">
    <time class="dt-published" datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Date.Format "Jan 2, 2006 3:04 PM" }}</time>
  </a>
</article>
